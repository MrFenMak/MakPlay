      <div class="adm-swatch" style="width:40px;height:40px;border-radius:8px;background:${col};cursor:pointer;border:2px solid ${i===as._selectedColorIdx?'var(--text)':'transparent'};display:flex;align-items:center;justify-content:center;font-weight:700;color:${bright?'#000':'#fff'};position:relative">
        ${escapeHtml(as.labels[i])}
        <span class="adm-del" style="position:absolute;top:-6px;right:-6px;background:#F87171;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;color:#fff">×</span>
      </div>
      <input value="${escapeHtml(as.labels[i])}" maxlength="2" style="width:40px;padding:3px;text-align:center;font-size:12px">
      <input type="color" value="${col}" style="width:40px;height:22px;padding:0;border:none;cursor:pointer">
    `;
    wrap.querySelector('.adm-swatch').onclick=()=>{as._selectedColorIdx=i;renderAdminPalette();};
    wrap.querySelector('.adm-del').onclick=(e)=>{e.stopPropagation();removeAdminColor(i);};
    wrap.querySelector('input[type=text],input:not([type])').oninput=function(){setAdminLabel(i,this.value);};
    wrap.querySelectorAll('input')[0].oninput=function(){setAdminLabel(i,this.value);};
    wrap.querySelectorAll('input')[1].onchange=function(){setAdminColorHex(i,this.value);};
    pal.appendChild(wrap);
  });
}

function setAdminLabel(i,val){
  if(!val)return;
  _adminState.labels[i]=val.slice(0,2);
  renderAdminCanvas(true);
}
function setAdminColorHex(i,val){
  _adminState.palette[i]=val;
  renderAdminPalette();renderAdminCanvas(true);
}

function addAdminColor(){
  const as=_adminState;
  const presetColors=['#E24B4A','#378ADD','#639922','#BA7517','#534AB7','#D85A30','#1D9E75','#D4537E','#5A6ACF','#C9A227'];
  const col=presetColors[as.palette.length%presetColors.length];
  as.palette.push(col);
  as.labels.push(defaultLabel(as.palette.length-1));
  as._selectedColorIdx=as.palette.length-1;
  renderAdminPalette();
}
function removeAdminColor(i){
  const as=_adminState;
  as.palette.splice(i,1);
  as.labels.splice(i,1);
  as.pixels.forEach(row=>row.forEach(px=>{if(px.colorIdx===i)px.colorIdx=-1;else if(px.colorIdx>i)px.colorIdx--;}));
  if(as._selectedColorIdx>=as.palette.length)as._selectedColorIdx=as.palette.length-1;
  renderAdminPalette();renderAdminCanvas(true);
}

function resizeAdminCanvas(){
  _adminState.cols=parseInt(document.getElementById('adm-cols').value);
  _adminState.rows=parseInt(document.getElementById('adm-rows').value);
  _adminState.pixels=makeEmptyPixels(_adminState.cols,_adminState.rows);
  renderAdminCanvas(true);
}

function clearAdminCanvas(){
  _adminState.pixels=makeEmptyPixels(_adminState.cols,_adminState.rows);
  renderAdminCanvas(true);
}

function renderAdminCanvas(fitToScreen){
  const as=_adminState;
  const cvs=document.getElementById('adm-canvas');
  if(!cvs)return;
  const wrap=document.getElementById('adm-canvas-wrap');
  if(fitToScreen||!as._admBaseCell){
    const SIZE=Math.min(Math.floor((wrap.clientWidth-20)/as.cols),Math.floor((wrap.clientHeight-20)/as.rows),28);
    as._admBaseCell=Math.max(SIZE,4);
    as._admZoom=1;
  }
  const cell=as._admBaseCell*as._admZoom;
  cvs.width=as.cols*cell;cvs.height=as.rows*cell;
  cvs.style.width=cvs.width+'px';cvs.style.height=cvs.height+'px';
  as._admCell=cell;
  const ctx=cvs.getContext('2d');
  as.pixels.forEach((row,r)=>row.forEach((px,c)=>{
    const x=c*cell,y=r*cell;
    if(px.colorIdx<0){ctx.fillStyle='#2A2A2E';ctx.fillRect(x,y,cell,cell);ctx.strokeStyle='#3A3A3E';ctx.lineWidth=0.5;ctx.strokeRect(x,y,cell,cell);}
    else{ctx.fillStyle=as.palette[px.colorIdx]||'#999';ctx.fillRect(x,y,cell,cell);}
  }));
  setupAdminCanvasEvents(cvs,wrap);
  wrap.classList.toggle('zoomed',as._admZoom>1.05);
  updateAdmPanToggleVisibility();
}

function setupAdminCanvasEvents(cvs,wrap){
  const as=_adminState;
  cvs.onmousedown=e=>{
    if(as._admPanMode){
      as._admPanStartX=e.clientX;as._admPanStartY=e.clientY;
      as._admPanScrollX=wrap.scrollLeft;as._admPanScrollY=wrap.scrollTop;
      as._admPanning=true;
      return;
    }
    as._adrawing=true;admPaint(e.clientX,e.clientY);
  };
  window.removeEventListener('mousemove',admGlobalMove);
  window.removeEventListener('mouseup',admGlobalUp);
  window.addEventListener('mousemove',admGlobalMove);
  window.addEventListener('mouseup',admGlobalUp);

  cvs.ontouchstart=e=>{
    if(e.touches.length===1){
      if(as._admPanMode){
        as._admPanStartX=e.touches[0].clientX;as._admPanStartY=e.touches[0].clientY;
        as._admPanScrollX=wrap.scrollLeft;as._admPanScrollY=wrap.scrollTop;
        as._admPanning=true;
        return;
      }
      e.preventDefault();as._adrawing=true;admPaint(e.touches[0].clientX,e.touches[0].clientY);
    }else if(e.touches.length===2){
      as._adrawing=false;as._admPanning=false;
      as._admPinchDist=getPinchDist(e.touches);
      as._admPinchZoomStart=as._admZoom;
    }
  };
  cvs.ontouchmove=e=>{
    if(e.touches.length===1&&as._admPanning){
      e.preventDefault();
      wrap.scrollLeft=as._admPanScrollX-(e.touches[0].clientX-as._admPanStartX);
      wrap.scrollTop=as._admPanScrollY-(e.touches[0].clientY-as._admPanStartY);
      return;
    }
    if(e.touches.length===1&&as._adrawing){
      e.preventDefault();admPaint(e.touches[0].clientX,e.touches[0].clientY);
    }else if(e.touches.length===2){
      e.preventDefault();
      const dist=getPinchDist(e.touches);
      setAdmZoom(as._admPinchZoomStart*(dist/as._admPinchDist));
    }
  };
  cvs.ontouchend=()=>{as._adrawing=false;as._admPanning=false;};

  wrap.onwheel=e=>{
    e.preventDefault();
    const delta=e.deltaY<0?1.1:0.9;
    setAdmZoom(as._admZoom*delta);
  };
}

function setAdmZoom(z){
  const as=_adminState;
  const wrap=document.getElementById('adm-canvas-wrap');
  const oldZoom=as._admZoom;
  const centerX=wrap.scrollLeft+wrap.clientWidth/2;
  const centerY=wrap.scrollTop+wrap.clientHeight/2;
  as._admZoom=Math.max(0.4,Math.min(8,z));
  renderAdminCanvas(false);
  const ratio=as._admZoom/oldZoom;
  wrap.scrollLeft=centerX*ratio-wrap.clientWidth/2;
  wrap.scrollTop=centerY*ratio-wrap.clientHeight/2;
}

function toggleAdmPanMode(){
  const as=_adminState;
  as._admPanMode=!as._admPanMode;
  const btn=document.getElementById('adm-pan-toggle');
  const cvs=document.getElementById('adm-canvas');
  if(as._admPanMode){
    btn.className='btn-orange';btn.style.padding='5px 10px';btn.style.fontSize='12px';
    if(cvs)cvs.style.cursor='grab';
  }else{
    btn.className='btn-ghost';btn.style.padding='5px 10px';btn.style.fontSize='12px';
    if(cvs)cvs.style.cursor='crosshair';
  }
}

function updateAdmPanToggleVisibility(){
  const as=_adminState;
  const btn=document.getElementById('adm-pan-toggle');
  if(!btn)return;
  if(as._admZoom>1.05){
    btn.classList.remove('hidden');
  }else{
    btn.classList.add('hidden');
    as._admPanMode=false;
    const cvs=document.getElementById('adm-canvas');
    if(cvs)cvs.style.cursor='crosshair';
    btn.className='btn-ghost';btn.style.padding='5px 10px';btn.style.fontSize='12px';
  }
}

function admGlobalMove(e){
  const as=_adminState;
  if(as._admPanning&&document.getElementById('admin-editor-overlay')){
    const wrap=document.getElementById('adm-canvas-wrap');
    wrap.scrollLeft=as._admPanScrollX-(e.clientX-as._admPanStartX);
    wrap.scrollTop=as._admPanScrollY-(e.clientY-as._admPanStartY);
    return;
  }
  if(as._adrawing&&document.getElementById('admin-editor-overlay'))admPaint(e.clientX,e.clientY);
}
function admGlobalUp(){_adminState._adrawing=false;_adminState._admPanning=false;}

function admPaint(clientX,clientY){
  const as=_adminState;
  if(as._admPanMode)return;
  if((as._selectedColorIdx===null||as._selectedColorIdx===undefined)&&as._tool!=='erase')return;
  const cvs=document.getElementById('adm-canvas');
  const rect=cvs.getBoundingClientRect();
  const scaleX=cvs.width/rect.width,scaleY=cvs.height/rect.height;
  const mx=(clientX-rect.left)*scaleX,my=(clientY-rect.top)*scaleY;
  const c=Math.floor(mx/as._admCell),r=Math.floor(my/as._admCell);
  if(r<0||r>=as.rows||c<0||c>=as.cols)return;
  const prev=as.pixels[r][c].colorIdx;
  const newIdx=as._tool==='erase'?-1:as._selectedColorIdx;
  if(prev===newIdx)return;
  as.pixels[r][c].colorIdx=newIdx;
  const ctx=cvs.getContext('2d');
  const x=c*as._admCell,y=r*as._admCell;
  if(newIdx<0){ctx.fillStyle='#2A2A2E';ctx.fillRect(x,y,as._admCell,as._admCell);ctx.strokeStyle='#3A3A3E';ctx.lineWidth=0.5;ctx.strokeRect(x,y,as._admCell,as._admCell);}
  else{ctx.fillStyle=as.palette[newIdx];ctx.fillRect(x,y,as._admCell,as._admCell);}
}

function uploadAdminImage(){document.getElementById('adm-file-input').click()}
function processAdminImage(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      _adminState._pendingImg=img;
      const existingCount=_adminState.palette.length;
      showModal(`
        <div class="modal-title">Автоматические цвета</div>
        <p style="color:var(--text2);font-size:14px;margin-bottom:12px">Сколько цветов создать автоматически на основе фото?${existingCount?` Уже добавленные вами ${existingCount} цвет(а) тоже будут использованы.`:''}</p>
        <div class="field"><label>Количество дополнительных цветов</label><input id="auto-color-count" type="number" value="6" min="1" max="32"></div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn-orange" style="flex:1" onclick="confirmAutoColors()">Создать</button>
          <button class="btn-ghost" style="flex:1" onclick="closeModal()">Отмена</button>
        </div>`);
      input.value='';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function confirmAutoColors(){
  const as=_adminState;
  const img=as._pendingImg;
  if(!img)return;
  const autoCount=Math.max(1,Math.min(32,parseInt(document.getElementById('auto-color-count').value)||6));
  closeModal();

  const off=document.createElement('canvas');
  off.width=as.cols;off.height=as.rows;
  const ctx=off.getContext('2d');
  ctx.drawImage(img,0,0,as.cols,as.rows);
  const data=ctx.getImageData(0,0,as.cols,as.rows).data;

  // собираем непрозрачные пиксели
  const samples=[];
  for(let i=0;i<data.length;i+=4){
    if(data[i+3]>=128)samples.push([data[i],data[i+1],data[i+2]]);
  }
  const existingPalette=as.palette.map(hexToRgb).map(c=>[c.r,c.g,c.b]);
  const generated=kMeansColors(samples,autoCount);
  const fullPaletteRgb=[...existingPalette,...generated];
  const fullPaletteHex=fullPaletteRgb.map(rgbToHex);

  as.palette=fullPaletteHex;
  as.labels=fullPaletteHex.map((_,i)=>defaultLabel(i));

  as.pixels=Array.from({length:as.rows},(_,r)=>Array.from({length:as.cols},(_,c)=>{
    const i=(r*as.cols+c)*4;
    const a=data[i+3];
    if(a<128)return{colorIdx:-1};
    const [rr,gg,bb]=[data[i],data[i+1],data[i+2]];
    let best=-1,bestD=Infinity;
    fullPaletteRgb.forEach(([pr,pg,pb],pi)=>{
      const d=(rr-pr)**2+(gg-pg)**2+(bb-pb)**2;
      if(d<bestD){bestD=d;best=pi;}
    });
    return{colorIdx:best};
  }));

  as._selectedColorIdx=as.palette.length?0:null;
  as._pendingImg=null;
  renderAdminPalette();
  renderAdminCanvas(true);
  showToast('Цвета созданы из фото!');
}

function rgbToHex([r,g,b]){
  return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}

function kMeansColors(samples,k){
  if(samples.length===0)return Array.from({length:k},()=>[200,200,200]);
  if(samples.length<=k)return samples;
  // случайные начальные центры из выборки
  let centers=[];
  const step=Math.floor(samples.length/k);
  for(let i=0;i<k;i++)centers.push(samples[Math.min(i*step,samples.length-1)].slice());

  for(let iter=0;iter<8;iter++){
    const sums=centers.map(()=>[0,0,0,0]);
    for(const [r,g,b] of samples){
      let best=0,bestD=Infinity;
      for(let i=0;i<centers.length;i++){
        const [cr,cg,cb]=centers[i];
        const d=(r-cr)**2+(g-cg)**2+(b-cb)**2;
        if(d<bestD){bestD=d;best=i;}
      }
      sums[best][0]+=r;sums[best][1]+=g;sums[best][2]+=b;sums[best][3]++;
    }
    centers=centers.map((c,i)=>sums[i][3]>0?[sums[i][0]/sums[i][3],sums[i][1]/sums[i][3],sums[i][2]/sums[i][3]]:c);
  }
  return centers;
}

async function publishAdminPic(){
  const as=_adminState;
  const name=document.getElementById('ap-name').value.trim();
  const err=document.getElementById('ap-err');
  if(!name){err.textContent='Введите название';return}
  const selectedCats=[...document.querySelectorAll('.ap-cat-cb:checked')].map(cb=>cb.value);
  if(!selectedCats.length){err.textContent='Выберите хотя бы одну категорию';return}
  as.name=name;
  as.reward=parseInt(document.getElementById('ap-reward').value)||0;
  as.price=parseInt(document.getElementById('ap-price').value)||0;
  as.categories=selectedCats;
  as.draft=false;
  const save={name:as.name,cols:as.cols,rows:as.rows,palette:as.palette,pixels:as.pixels,draft:false,reward:as.reward,price:as.price,categories:as.categories,createdBy:window._cu.login,labels:as.labels};
  try{
    if(as.id){await DB.updatePicture(as.id,save);}
    else{await DB.createPicture(save);}
  }catch(e){
    console.error(e);
    showToast('Ошибка публикации: '+(e.message||e.details||'неизвестная ошибка'));
    return;
  }
  closeModal();
  window.removeEventListener('mousemove',admGlobalMove);
  window.removeEventListener('mouseup',admGlobalUp);
  const el=document.getElementById('admin-editor-overlay');
  if(el)el.remove();
  _adminState={};
  await renderHome();
  showToast('Картина опубликована!');
}

// PULL TO REFRESH (мобильные устройства)

function setupPullToRefresh(){
  const scrollEl=document.getElementById('view-home');
  const indicator=document.getElementById('ptr-indicator');
  const spinner=document.getElementById('ptr-spinner');
  const label=document.getElementById('ptr-label');
  const THRESHOLD=70;
  let startY=0,pulling=false,refreshing=false;

  scrollEl.addEventListener('touchstart',e=>{
    if(scrollEl.scrollTop<=0&&getActiveNav()==='home'){
      startY=e.touches[0].clientY;
      pulling=true;
    }else{
      pulling=false;
    }
  },{passive:true});

  scrollEl.addEventListener('touchmove',e=>{
    if(!pulling||refreshing)return;
    const diff=e.touches[0].clientY-startY;
    if(diff>0&&scrollEl.scrollTop<=0){
      const height=Math.min(diff*0.5,90);
      indicator.style.height=height+'px';
      spinner.style.transform=`rotate(${height*4}deg)`;
      label.textContent=height>=THRESHOLD?'Отпустите, чтобы обновить':'Потяните, чтобы обновить';
    }
  },{passive:true});

  scrollEl.addEventListener('touchend',async()=>{
    if(!pulling||refreshing)return;
    const height=parseInt(indicator.style.height)||0;
    pulling=false;
    if(height>=THRESHOLD){
      refreshing=true;
      indicator.style.height='50px';
      label.textContent='Обновление...';
      spinner.style.animation='spin .6s linear infinite';
      await renderHome();
      spinner.style.animation='';
      indicator.style.height='0px';
      refreshing=false;
    }else{
      indicator.style.height='0px';
    }
  });
}

async function init(){
  initSupabase();
  setupCatsDrag();
  setupPullToRefresh();
  document.getElementById('loading-overlay').style.display='none';

  const saved=getSavedLogin();
  if(saved){
    try{
      const u=await DB.getUser(saved);
      if(u){await enterApp(u);}
      else{document.getElementById('auth-screen').classList.add('active');}
    }catch(e){
      console.error(e);
      document.getElementById('auth-screen').classList.add('active');
    }
  }else{
    document.getElementById('auth-screen').classList.add('active');
  }

  if(DEMO_MODE){
    showToast('⚠ Supabase не настроен — демо-режим (localStorage)');
  }
}
init();
