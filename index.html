<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}
:root{
  --orange:#F97316;
  --orange-dark:#EA580C;
  --bg:#F4F4F5;
  --bg2:#FFFFFF;
  --bg3:#E4E4E7;
  --text:#18181B;
  --text2:#71717A;
  --border:#D4D4D8;
  --card:#FFFFFF;
}
html.dark{
  --bg:#18181B;
  --bg2:#27272A;
  --bg3:#3F3F46;
  --text:#FAFAFA;
  --text2:#A1A1AA;
  --border:#52525B;
  --card:#1C1C1F;
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .2s,color .2s}
input,textarea,select{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;width:100%;font-size:14px;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--orange)}
button{cursor:pointer;border:none;border-radius:8px;font-size:14px;font-weight:500;padding:10px 20px;transition:all .15s;font-family:inherit}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{background:var(--orange-dark)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange)}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* AUTH */
#auth-screen{align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--bg2);border-radius:16px;padding:32px;width:100%;max-width:380px;border:1px solid var(--border)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo h1{font-size:28px;font-weight:700;color:var(--orange)}
.auth-tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--bg3);border-radius:8px;padding:4px}
.auth-tab{flex:1;padding:8px;border-radius:6px;background:transparent;color:var(--text2);border:none;cursor:pointer;font-size:14px}
.auth-tab.active{background:var(--orange);color:#fff}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}
.err{color:#F87171;font-size:13px;margin-top:8px;text-align:center;min-height:16px}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOP BAR with coins */
.top-bar-main{background:var(--orange);display:flex;align-items:center;gap:8px;padding:8px 12px;flex-shrink:0}
.coins-display{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.18);border-radius:20px;padding:5px 12px;color:#fff;font-weight:600;font-size:13px;flex-shrink:0;white-space:nowrap}
.coin-icon{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFE899,#F5C518 60%,#C9960B);display:inline-block;border:1px solid #A67A05;flex-shrink:0}
.cats-scroll{flex:1;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;scroll-behavior:smooth;cursor:grab;min-width:0}
.cats-scroll::-webkit-scrollbar{display:none}
.cats-scroll.dragging{cursor:grabbing;scroll-behavior:auto}
.cat-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cat-btn.active{background:#fff;color:var(--orange-dark)}
.cat-arrow{background:rgba(0,0,0,.18);border:none;color:#fff;width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.theme-toggle{background:rgba(0,0,0,.18);border:none;width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff}
.theme-toggle svg{width:17px;height:17px}

/* BOTTOM NAV */
.bottom-nav{background:var(--orange);display:flex;height:58px;flex-shrink:0;position:sticky;bottom:0;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:rgba(255,255,255,.7);background:transparent;border:none;cursor:pointer;font-size:10px}
.nav-btn.active,.nav-btn:hover{color:#fff}
.nav-btn svg{width:22px;height:22px}

/* MAIN CONTENT */
.main-content{flex:1;overflow-y:auto;padding:12px}

/* GRID */
.pictures-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.pic-card{background:var(--bg2);border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .1s,border-color .1s}
.pic-card:hover{transform:translateY(-2px);border-color:var(--orange)}
.pic-thumb{width:100%;aspect-ratio:1;position:relative;background:var(--bg3);overflow:hidden}
.pic-thumb canvas{width:100%;height:100%;image-rendering:pixelated;display:block}
.pic-info{padding:8px}
.pic-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pic-meta{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;margin-top:3px}
.coin-badge{background:rgba(249,115,22,.15);color:var(--orange-dark);border-radius:6px;padding:2px 6px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
html.dark .coin-badge{color:#FDBA74}
.progress-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--orange);transition:width .3s}
.lock-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;color:#fff;font-size:12px}
.lock-overlay svg{width:26px;height:26px}
.pic-edit-pencil{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
.pic-drag-handle{position:absolute;top:4px;left:4px;width:24px;height:24px;border-radius:6px;background:rgba(0,0,0,.55);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:grab}
.pic-delete-draft{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(248,113,113,.85);border:none;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}

/* DRAWING SCREEN */
#draw-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column}
#draw-screen.open{display:flex}
.draw-top{background:var(--bg2);padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.draw-title{font-weight:600;font-size:15px;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);max-width:55%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
.draw-canvas-wrap{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:10px;position:relative;-webkit-overflow-scrolling:touch}
.draw-canvas-wrap.zoomed{justify-content:flex-start;align-items:flex-start}
#draw-canvas{image-rendering:pixelated;cursor:crosshair;touch-action:none;flex-shrink:0}
.color-menu{background:var(--bg2);border-top:1px solid var(--border);padding:10px 12px;flex-shrink:0}
.color-row{display:flex;gap:6px;align-items:center;justify-content:flex-start;flex-wrap:wrap}
.color-item{position:relative;width:44px;height:44px;border-radius:8px;cursor:pointer;border:2px solid transparent;overflow:hidden;flex-shrink:0}
.color-item.selected{border-color:var(--text)}
.color-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;pointer-events:none}
.color-progress{position:absolute;bottom:0;left:0;height:4px;background:rgba(255,255,255,.85)}
.color-nav{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:6px}
.nav-arr{background:var(--bg3);border:none;color:var(--text);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:16px}
.zoom-hint{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);color:#fff;font-size:11px;padding:4px 8px;border-radius:6px;pointer-events:none;opacity:0;transition:opacity .3s}

/* PROFILE */
.profile-wrap{max-width:600px;margin:0 auto;padding:16px}
.profile-header{display:flex;gap:16px;align-items:flex-start;margin-bottom:20px}
.profile-info{flex:1;min-width:0}
.profile-nick{font-size:20px;font-weight:700}
.profile-login{font-size:12px;color:var(--text2)}
.profile-desc{font-size:14px;color:var(--text2);margin-top:6px;word-break:break-word}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.stat-box{background:var(--bg2);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border)}
.stat-num{font-size:22px;font-weight:700;color:var(--orange);display:flex;align-items:center;justify-content:center;gap:5px}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.edit-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer}
.edit-btn:hover{border-color:var(--orange)}
.section-title{font-size:15px;font-weight:600;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.completed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.completed-card{border-radius:10px;overflow:hidden;cursor:pointer;background:var(--bg2);border:1px solid var(--border)}
.completed-card canvas{width:100%;aspect-ratio:1;display:block;image-rendering:pixelated}

/* FRIENDS / SEARCH */
.search-bar-wrap{padding:12px}
.search-input-wrap{position:relative}
.search-input-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);width:18px;height:18px}
.search-input-wrap input{padding-left:36px}
.user-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg2);border-radius:10px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer}
.user-item:hover{border-color:var(--orange)}
.u-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg3);object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0;color:var(--text)}
.u-name{font-weight:600;font-size:14px}
.u-sub{font-size:12px;color:var(--text2)}
.friend-actions{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
.badge{border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600}
.badge-green{background:rgba(74,222,128,.15);color:#22C55E}
.badge-orange{background:rgba(249,115,22,.15);color:var(--orange)}

/* TOP */
.top-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--bg2);border-radius:8px;padding:4px;border:1px solid var(--border)}
.top-tab{flex:1;padding:8px;background:transparent;border:none;color:var(--text2);border-radius:6px;cursor:pointer;font-size:13px}
.top-tab.active{background:var(--orange);color:#fff}
.top-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg2);border-radius:10px;margin-bottom:8px;border:1px solid var(--border)}
.top-rank{font-size:18px;font-weight:700;color:var(--orange);width:28px;text-align:center;flex-shrink:0}
.top-val{font-size:14px;font-weight:700;color:var(--orange);margin-left:auto;display:flex;align-items:center;gap:4px;flex-shrink:0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--bg2);border-radius:16px;padding:24px;width:100%;max-width:420px;border:1px solid var(--border);max-height:88vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}

/* ADMIN */
.admin-fab{position:fixed;bottom:70px;right:16px;width:48px;height:48px;border-radius:50%;background:var(--orange);border:none;color:#fff;font-size:24px;cursor:pointer;z-index:150;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(249,115,22,.4)}

/* VIEW COMPLETED */
#view-completed-screen{position:fixed;inset:0;background:var(--bg);z-index:250;display:none;flex-direction:column}
#view-completed-screen.open{display:flex}

/* LOADING OVERLAY */
#loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#loading-overlay .spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}

/* UTILS */
.hidden{display:none!important}
.w100{width:100%}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:8px;font-size:13px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="loading-overlay"><div class="spin"></div><div style="color:var(--text2);font-size:13px">Загрузка Mak Art...</div></div>

<!-- AUTH SCREEN -->

    </button>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

    </button>
    <button class="nav-btn" id="nav-friends" onclick="goNav('friends')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Друзья
    </button>
    <button class="nav-btn" id="nav-top" onclick="goNav('top')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,6 13.5,15.5 8.5,10.5 1,18"/><polyline points="17,6 23,6 23,12"/></svg>
      Топ
    </button>
    <button class="nav-btn" id="nav-profile" onclick="goNav('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>

  <button class="admin-fab hidden" id="admin-fab" onclick="openAdminAdd()">+</button>

<!-- DRAWING SCREEN -->
<div id="draw-screen">
  <div class="draw-top">
    <button class="btn-ghost" style="padding:7px 12px" onclick="exitDraw()">← Назад</button>
    <span class="draw-title" id="draw-title"></span>
    <button id="draw-pan-toggle" class="btn-ghost hidden" style="padding:7px 10px;font-size:12px;margin-left:auto" onclick="togglePanMode()">✋ Двигать</button>

<script>
// ============================================================
// SUPABASE CONFIG — ВСТАВЬ СВОИ ДАННЫЕ СЮДА
// ============================================================
const SUPABASE_URL = 'https://shsvnlhhftspngysixst.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_r4i-GTRSKCHX-xPpFXRAvw_OKncuI7X';

let sb = null;
let DEMO_MODE = false;

function initSupabase(){
  if(SUPABASE_URL.includes('YOUR-PROJECT') || SUPABASE_ANON_KEY.includes('YOUR-ANON')){
    DEMO_MODE = true;
    console.warn('Mak Art: Supabase не настроен. Впиши свои данные в SUPABASE_URL / SUPABASE_ANON_KEY. Сейчас приложение работает в демо-режиме на localStorage.');
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

// ============================================================
// LOCAL FALLBACK STORAGE (только для DEMO_MODE без supabase)
// ============================================================
const LS = {
  get(k){try{return JSON.parse(localStorage.getItem('makart_'+k))}catch{return null}},
  set(k,v){localStorage.setItem('makart_'+k,JSON.stringify(v))}
};

// ============================================================
// THEME
// ============================================================
function applyTheme(theme){
  document.documentElement.classList.toggle('dark',theme==='dark');
  const btn=document.getElementById('theme-toggle');
  btn.innerHTML = theme==='dark'
    ? `<svg viewBox="0 0 24 24" width="17" height="17"><path fill="#fff" d="M12 2.5a9.5 9.5 0 1 0 9.46 10.55.75.75 0 0 0-.9-.83 7.6 7.6 0 0 1-9.18-9.18.75.75 0 0 0-.83-.9c-.07.01-.13.02-.55.06A9.5 9.5 0 0 0 12 2.5z"/><circle cx="8.7" cy="9" r="1" fill="#fff" opacity="0.45"/><circle cx="11.3" cy="13.2" r="1.3" fill="#fff" opacity="0.45"/><circle cx="7.6" cy="14" r="0.8" fill="#fff" opacity="0.45"/></svg>`
    : `<svg viewBox="0 0 24 24" width="17" height="17"><circle cx="12" cy="12" r="5" fill="#fff"/><g stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1.5" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.5"/><line x1="1.5" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22.5" y2="12"/><line x1="4.2" y1="4.2" x2="5.9" y2="5.9"/><line x1="18.1" y1="18.1" x2="19.8" y2="19.8"/><line x1="4.2" y1="19.8" x2="5.9" y2="18.1"/><line x1="18.1" y1="5.9" x2="19.8" y2="4.2"/></g></svg>`;
  localStorage.setItem('makart_theme',theme);
}
function toggleTheme(){
  const cur=document.documentElement.classList.contains('dark')?'dark':'light';
  applyTheme(cur==='dark'?'light':'dark');
}
applyTheme(localStorage.getItem('makart_theme')||'light');

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ============================================================
// DATA ACCESS LAYER
// Абстракция поверх Supabase, чтобы остальной код не зависел от backend
// ============================================================
const DB = {
  async getUsers(){
    if(DEMO_MODE)return LS.get('users')||[];
    const {data,error}=await sb.from('users').select('*');
    if(error){console.error(error);return[]}
    return data.map(mapUserFromDb);
  },
  async getUser(login){
    if(DEMO_MODE)return(LS.get('users')||[]).find(u=>u.login===login)||null;
    const {data,error}=await sb.from('users').select('*').eq('login',login).maybeSingle();
    if(error||!data)return null;
    return mapUserFromDb(data);
  },
  async createUser(u){
    if(DEMO_MODE){
      const users=LS.get('users')||[];
      users.push(u);LS.set('users',users);return u;
    }
    const {data,error}=await sb.from('users').insert({
      login:u.login,password:u.password,nick:u.nick,desc_text:u.desc||'',
      coins:0,total_coins:0,avatar:u.avatar||null,is_admin:u.isAdmin||false
    }).select().single();
    if(error)throw error;
    return mapUserFromDb(data);
  },
  async updateUser(login,fields){
    if(DEMO_MODE){
      const users=LS.get('users')||[];
      const i=users.findIndex(u=>u.login===login);
      if(i>=0){users[i]={...users[i],...fields};LS.set('users',users);}
      return;
    }
    const dbFields={};
    if('nick' in fields)dbFields.nick=fields.nick;
    if('desc' in fields)dbFields.desc_text=fields.desc;
    if('coins' in fields)dbFields.coins=fields.coins;
    if('totalCoins' in fields)dbFields.total_coins=fields.totalCoins;
    if('avatar' in fields)dbFields.avatar=fields.avatar;
    const {error}=await sb.from('users').update(dbFields).eq('login',login);
    if(error)console.error(error);
  },
  async deleteUser(login){
    if(DEMO_MODE){
      LS.set('users',(LS.get('users')||[]).filter(u=>u.login!==login));
      return;
    }
    await sb.from('users').delete().eq('login',login);
  },

  async getCategories(){
    if(DEMO_MODE)return LS.get('categories')||['Все'];
    const {data,error}=await sb.from('categories').select('name').order('id');
    if(error)return['Все'];
    return data.map(c=>c.name);
  },
  async addCategory(name){
    if(DEMO_MODE){
      const cats=LS.get('categories')||['Все'];
      if(!cats.includes(name)){cats.push(name);LS.set('categories',cats);}
      return;
    }
    await sb.from('categories').insert({name});
  },
  async deleteCategory(name){
    if(DEMO_MODE){
      LS.set('categories',(LS.get('categories')||[]).filter(c=>c!==name));
      return;
    }
    await sb.from('categories').delete().eq('name',name);
  },

  async getPictures(){
    if(DEMO_MODE)return LS.get('pictures')||[];
    const {data,error}=await sb.from('pictures').select('*').order('id');
    if(error){console.error(error);return[]}
    return data.map(mapPicFromDb);
  },
  async createPicture(p){
    if(DEMO_MODE){
      const pics=LS.get('pictures')||[];
      p.id=p.id||Date.now();
      if(p.sortOrder===undefined)p.sortOrder=pics.length;
      pics.push(p);LS.set('pictures',pics);return p;
    }
    const {data,error}=await sb.from('pictures').insert({
      name:p.name,cols:p.cols,rows:p.rows,palette:p.palette,pixels:p.pixels,
      reward:p.reward,price:p.price,categories:p.categories||['Все'],is_draft:p.draft,created_by:p.createdBy,labels:p.labels||[],
      sort_order:p.sortOrder||0
    }).select().single();
    if(error)throw error;
    return mapPicFromDb(data);
  },
  async updatePicture(id,fields){
    if(DEMO_MODE){
      const pics=LS.get('pictures')||[];
      const i=pics.findIndex(p=>p.id===id);
      if(i>=0){pics[i]={...pics[i],...fields};LS.set('pictures',pics);}
      return;
    }
    const dbFields={};
    if('name' in fields)dbFields.name=fields.name;
    if('cols' in fields)dbFields.cols=fields.cols;
    if('rows' in fields)dbFields.rows=fields.rows;
    if('palette' in fields)dbFields.palette=fields.palette;
    if('pixels' in fields)dbFields.pixels=fields.pixels;
    if('reward' in fields)dbFields.reward=fields.reward;
    if('price' in fields)dbFields.price=fields.price;
    if('categories' in fields)dbFields.categories=fields.categories;
    if('draft' in fields)dbFields.is_draft=fields.draft;
    if('labels' in fields)dbFields.labels=fields.labels;
    if('sortOrder' in fields)dbFields.sort_order=fields.sortOrder;
    const {error}=await sb.from('pictures').update(dbFields).eq('id',id);
    if(error){console.error(error);throw error;}
  },
  async deletePicture(id){
    if(DEMO_MODE){LS.set('pictures',(LS.get('pictures')||[]).filter(p=>p.id!==id));return;}
    const {error}=await sb.from('pictures').delete().eq('id',id);
    if(error){console.error(error);throw error;}
  },

  async getProgress(userLogin,pictureId){
    if(DEMO_MODE){
      const all=LS.get('progress')||[];
      return all.find(p=>p.userLogin===userLogin&&p.pictureId===pictureId)||null;
    }
    const {data,error}=await sb.from('progress').select('*').eq('user_login',userLogin).eq('picture_id',pictureId).maybeSingle();
    if(error||!data)return null;
    return mapProgressFromDb(data);
  },
  async getAllProgressForUser(userLogin){
    if(DEMO_MODE){
      return(LS.get('progress')||[]).filter(p=>p.userLogin===userLogin);
    }
    const {data,error}=await sb.from('progress').select('*').eq('user_login',userLogin);
    if(error)return[];
    return data.map(mapProgressFromDb);
  },
  async createProgress(p){
    if(DEMO_MODE){
      const all=LS.get('progress')||[];
      all.push(p);LS.set('progress',all);return p;
    }
    const {data,error}=await sb.from('progress').insert({
      user_login:p.userLogin,picture_id:p.pictureId,pixels:p.pixels,
      is_full:p.full,purchased:p.purchased||false
    }).select().single();
    if(error)throw error;
    return mapProgressFromDb(data);
  },
  async updateProgress(userLogin,pictureId,fields){
    if(DEMO_MODE){
      const all=LS.get('progress')||[];
      const i=all.findIndex(p=>p.userLogin===userLogin&&p.pictureId===pictureId);
      if(i>=0){all[i]={...all[i],...fields};LS.set('progress',all);}
      return;
    }
    const dbFields={};
    if('pixels' in fields)dbFields.pixels=fields.pixels;
    if('full' in fields)dbFields.is_full=fields.full;
    if('purchased' in fields)dbFields.purchased=fields.purchased;
    if('doneAt' in fields)dbFields.done_at=fields.doneAt?new Date(fields.doneAt).toISOString():null;
    dbFields.updated_at=new Date().toISOString();
    const {error}=await sb.from('progress').update(dbFields).eq('user_login',userLogin).eq('picture_id',pictureId);
    if(error)console.error(error);
  },

  async getFriends(login){
    if(DEMO_MODE){
      const fs=LS.get('friendships')||[];
      return fs.filter(f=>f.userLogin===login).map(f=>f.friendLogin);
    }
    const {data,error}=await sb.from('friendships').select('friend_login').eq('user_login',login);
    if(error)return[];
    return data.map(d=>d.friend_login);
  },
  async addFriendship(a,b){
    if(DEMO_MODE){
      const fs=LS.get('friendships')||[];
      fs.push({userLogin:a,friendLogin:b});
      fs.push({userLogin:b,friendLogin:a});
      LS.set('friendships',fs);return;
    }
    await sb.from('friendships').insert([{user_login:a,friend_login:b},{user_login:b,friend_login:a}]);
  },
  async getFriendRequests(toLogin){
    if(DEMO_MODE){
      return(LS.get('requests')||[]).filter(r=>r.toLogin===toLogin).map(r=>r.fromLogin);
    }
    const {data,error}=await sb.from('friend_requests').select('from_login').eq('to_login',toLogin);
    if(error)return[];
    return data.map(d=>d.from_login);
  },
  async sendFriendRequest(from,to){
    if(DEMO_MODE){
      const reqs=LS.get('requests')||[];
      if(reqs.find(r=>r.fromLogin===from&&r.toLogin===to))return false;
      reqs.push({fromLogin:from,toLogin:to});LS.set('requests',reqs);return true;
    }
    const {error}=await sb.from('friend_requests').insert({from_login:from,to_login:to});
    return !error;
  },
  async removeFriendRequest(from,to){
    if(DEMO_MODE){
      LS.set('requests',(LS.get('requests')||[]).filter(r=>!(r.fromLogin===from&&r.toLogin===to)));
      return;
    }
    await sb.from('friend_requests').delete().eq('from_login',from).eq('to_login',to);
  }
};

function mapUserFromDb(d){
  return{login:d.login,password:d.password,nick:d.nick,desc:d.desc_text||'',
    coins:d.coins||0,totalCoins:d.total_coins||0,avatar:d.avatar||null,isAdmin:!!d.is_admin};

function mapPicFromDb(d){
  return{id:d.id,name:d.name,cols:d.cols,rows:d.rows,palette:d.palette,pixels:d.pixels,
    reward:d.reward,price:d.price,categories:(d.categories&&d.categories.length?d.categories:(d.category?[d.category]:['Все'])),
    draft:d.is_draft,createdBy:d.created_by,labels:d.labels||[],sortOrder:d.sort_order||0};
}
function mapProgressFromDb(d){
  return{userLogin:d.user_login,pictureId:d.picture_id,pixels:d.pixels||{},
    full:!!d.is_full,purchased:!!d.purchased,doneAt:d.done_at?new Date(d.done_at).getTime():null};

async function doLogin(){
  const login=document.getElementById('li-login').value.trim();
  const pass=document.getElementById('li-pass').value;
  const errEl=document.getElementById('li-err');
  const btn=document.getElementById('li-btn');
  errEl.textContent='';
  if(!login||!pass){errEl.textContent='Заполните все поля';return}
  btn.innerHTML='<span class="spinner"></span>';
  try{
    const u=await DB.getUser(login);
    if(!u||u.password!==pass){errEl.textContent='Неверный логин или пароль';btn.textContent='Войти';return}
    saveSession(login);
    await enterApp(u);
  }catch(e){console.error(e);errEl.textContent='Ошибка подключения к серверу';}
  btn.textContent='Войти';
}

async function doRegister(){
  const login=document.getElementById('re-login').value.trim();
  const pass=document.getElementById('re-pass').value;
  const err=document.getElementById('re-err');
  const btn=document.getElementById('re-btn');
  err.textContent='';
  if(login.length<2){err.textContent='Логин слишком короткий';return}
  if(pass.length<3){err.textContent='Пароль слишком короткий';return}
  if(!/^[a-zA-Zа-яА-Я0-9_]+$/.test(login)){err.textContent='Логин: только буквы, цифры, _';return}
  btn.innerHTML='<span class="spinner"></span>';
  try{
    const existing=await DB.getUser(login);
    if(existing){err.textContent='Логин уже занят';btn.textContent='Зарегистрироваться';return}
    const users=await DB.getUsers();
    if(users.find(u=>u.nick===login)){err.textContent='Этот ник уже занят';btn.textContent='Зарегистрироваться';return}
    const nu={login,password:pass,nick:login,desc:'',coins:0,totalCoins:0,avatar:null,isAdmin:login==='M_fen'};
    const created=await DB.createUser(nu);
    saveSession(login);
    await enterApp(created);
  }catch(e){console.error(e);err.textContent='Ошибка подключения к серверу';}
  btn.textContent='Зарегистрироваться';
}

let _channels=[];
function subscribeRealtime(){
  if(DEMO_MODE||!sb)return;
  unsubscribeRealtime();
  const ch=sb.channel('makart-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'pictures'},()=>{if(!isDrawOpen())renderHome();})
    .on('postgres_changes',{event:'*',schema:'public',table:'categories'},()=>{renderCats();})
    .on('postgres_changes',{event:'*',schema:'public',table:'users'},()=>{if(getActiveNav()==='top')renderTop();})
    .subscribe();
  _channels.push(ch);
}
function unsubscribeRealtime(){
  _channels.forEach(c=>sb&&sb.removeChannel(c));
  _channels=[];
}

let _sortMode='newest';
const SORT_LABELS={
  newest:'Сначала новые',
  oldest:'Сначала старые',
  freeFirst:'Сначала бесплатные',
  paidFirst:'Сначала платные',
  smallFirst:'Сначала маленькие',
  bigFirst:'Сначала большие'
};

function sortPictures(pics){
  const arr=[...pics];
  switch(_sortMode){
    case 'newest': return arr.sort((a,b)=>b.id-a.id);
    case 'oldest': return arr.sort((a,b)=>a.id-b.id);
    case 'freeFirst': return arr.sort((a,b)=>(a.price>0?1:0)-(b.price>0?1:0));
    case 'paidFirst': return arr.sort((a,b)=>(b.price>0?1:0)-(a.price>0?1:0));
    case 'smallFirst': return arr.sort((a,b)=>(a.cols*a.rows)-(b.cols*b.rows));
    case 'bigFirst': return arr.sort((a,b)=>(b.cols*b.rows)-(a.cols*a.rows));
    default: return arr;
  }
}

function openSortMenu(){
  const items=Object.entries(SORT_LABELS).map(([key,label])=>
    `<button class="btn-ghost w100" style="text-align:left;margin-bottom:6px;${key===_sortMode?'border-color:var(--orange);color:var(--orange)':''}" onclick="setSortMode('${key}')">${label}${key===_sortMode?' ✓':''}</button>`
  ).join('');
  showModal(`<div class="modal-title">Сортировка картин</div>${items}`);
}

}

async function renderPictures(){
  const cu=await refreshCurrentUser();
  const home=document.getElementById('view-home');
  home.innerHTML='<div style="text-align:center;padding:40px;color:var(--text2)">Загрузка...</div>';

  const [allPics,myProgress]=await Promise.all([DB.getPictures(),DB.getAllProgressForUser(cu.login)]);
  let pics=allPics.filter(p=>!p.draft);
  if(_activeCat!=='Все')pics=pics.filter(p=>(p.categories||['Все']).includes(_activeCat));

  const progressMap={};
  myProgress.forEach(p=>progressMap[p.pictureId]=p);

  pics=pics.filter(p=>{
    const pr=progressMap[p.id];
    return!(pr&&pr.full);
  });

  pics=sortPictures(pics);

  home.innerHTML='';

  const header=document.createElement('div');
  header.style.cssText='display:flex;justify-content:flex-end;margin-bottom:8px';
  header.innerHTML=`<button class="btn-ghost" style="padding:6px 10px;font-size:12px;display:flex;align-items:center;gap:5px" onclick="openSortMenu()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h10M3 12h7M3 17h4"/><path d="M17 5v14M17 5l-3 3M17 5l3 3M17 19l-3-3M17 19l3-3"/></svg>${SORT_LABELS[_sortMode]}</button>`;
  home.appendChild(header);

  if(pics.length===0){
    const empty=document.createElement('div');
    empty.style.cssText='text-align:center;padding:60px 20px;color:var(--text2)';
    empty.innerHTML='Нет доступных картин 🎉';
    home.appendChild(empty);
  }else{
    const grid=document.createElement('div');
    grid.className='pictures-grid';
    pics.forEach(p=>{
      const progress=progressMap[p.id];
      const pct=progress?calcPercent(progress.pixels,p.pixels):0;
      const purchased=progress&&progress.purchased;
      const locked=p.price>0&&!purchased;
      const card=document.createElement('div');
      card.className='pic-card';
      card.innerHTML=`
        <div class="pic-thumb">
          <canvas id="thumb-${p.id}" width="${p.cols}" height="${p.rows}"></canvas>
          ${locked?`<div class="lock-overlay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span style="display:flex;align-items:center;gap:4px"><span class="coin-icon"></span>${p.price}</span></div>`:''}
          ${cu.isAdmin?`<button class="pic-edit-pencil" onclick="event.stopPropagation();openAdminQuickEdit(${p.id})" title="Изменить">✏️</button>`:''}
          ${cu.isAdmin?`<div class="pic-drag-handle" draggable="true" title="Перетащить">⠿</div>`:''}
        </div>
        <div class="pic-info">
          <div class="pic-name">${escapeHtml(p.name)}</div>
          <div class="pic-meta"><span class="coin-badge"><span class="coin-icon"></span>+${p.reward}</span>${p.price?`<span style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:3px"><span class="coin-icon"></span>${p.price}</span>`:''}</div>
          ${pct>0?`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`:''}
        </div>`;
      card.dataset.picId=p.id;
      card.onclick=()=>openPicture(p,progress);
      grid.appendChild(card);
      setTimeout(()=>drawThumb(p,progress,`thumb-${p.id}`),0);
    });
    home.appendChild(grid);
    if(cu.isAdmin)setupDragReorder(grid,pics);
  }

  if(cu.isAdmin){
    const drafts=allPics.filter(p=>p.draft);
    if(drafts.length){
      const dt=document.createElement('div');
      dt.innerHTML='<div class="section-title">Черновики (видны только вам)</div>';
      const dg=document.createElement('div');dg.className='pictures-grid';
      drafts.forEach(p=>{
        const dc=document.createElement('div');dc.className='pic-card';
        dc.style.opacity='0.65';dc.style.position='relative';
        dc.innerHTML=`<div class="pic-thumb"><canvas id="thumb-d${p.id}" width="${p.cols}" height="${p.rows}"></canvas></div><div class="pic-info"><div class="pic-name">📝 ${escapeHtml(p.name||'Без названия')}</div></div><button class="pic-delete-draft" onclick="event.stopPropagation();deleteDraft(${p.id})" title="Удалить черновик">🗑</button>`;
        dc.onclick=()=>openAdminEdit(p);
        dg.appendChild(dc);
        setTimeout(()=>drawThumb(p,null,`thumb-d${p.id}`),0);
      });
      dt.appendChild(dg);
      home.appendChild(dt);
    }
  }
}

function setupDragReorder(grid,pics){
  let dragSrcCard=null;
  grid.querySelectorAll('.pic-drag-handle').forEach(handle=>{
    const card=handle.closest('.pic-card');
    handle.addEventListener('dragstart',e=>{
      dragSrcCard=card;
      e.dataTransfer.effectAllowed='move';
      card.style.opacity='0.4';
    });
    handle.addEventListener('dragend',()=>{
      if(dragSrcCard)dragSrcCard.style.opacity='1';
      dragSrcCard=null;
    });
  });
  grid.querySelectorAll('.pic-card').forEach(card=>{
    card.addEventListener('dragover',e=>{
      e.preventDefault();
      if(!dragSrcCard||dragSrcCard===card)return;
      const rect=card.getBoundingClientRect();
      const before=(e.clientX-rect.left)<rect.width/2;
      grid.insertBefore(dragSrcCard,before?card:card.nextSibling);
    });
    card.addEventListener('drop',async e=>{
      e.preventDefault();
      if(!dragSrcCard)return;
      const newOrderIds=[...grid.querySelectorAll('.pic-card')].map(c=>parseInt(c.dataset.picId));
      await Promise.all(newOrderIds.map((id,idx)=>DB.updatePicture(id,{sortOrder:idx})));
      showToast('Порядок сохранён');
    });
  });
}

function escapeHtml(s){
  const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;
}

function calcPercent(userPixels,picPixels){
  if(!picPixels||!userPixels)return 0;
  let total=0;
  picPixels.forEach(row=>row.forEach(px=>{if(px.colorIdx>=0)total++}));
  if(!total)return 0;
  const done=Object.keys(userPixels).length;
  return Math.round(done/total*100);
}

function drawThumb(pic,progress,canvasId){
  const cvs=document.getElementById(canvasId);
  if(!cvs)return;
  const ctx=cvs.getContext('2d');
  const W=pic.cols,H=pic.rows;
  cvs.width=W;cvs.height=H;
  const img=ctx.createImageData(W,H);
  pic.pixels.forEach((row,r)=>row.forEach((px,c)=>{
    const i=(r*W+c)*4;
    if(px.colorIdx<0){
      img.data[i]=235;img.data[i+1]=235;img.data[i+2]=235;img.data[i+3]=255;
    }else{
      const col=pic.palette[px.colorIdx];
      const rgb=hexToRgb(col);
      const key=`${r},${c}`;
      if(progress&&progress.pixels[key]!==undefined){
        img.data[i]=rgb.r;img.data[i+1]=rgb.g;img.data[i+2]=rgb.b;img.data[i+3]=255;
      }else{
        const brightness=0.299*rgb.r+0.587*rgb.g+0.114*rgb.b;
        const v=brightness<128?60:215;
        img.data[i]=v;img.data[i+1]=v;img.data[i+2]=v;img.data[i+3]=255;
      }
    }
  }));
  ctx.putImageData(img,0,0);
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return{r,g,b};
}
function isLight(hex){
  const{r,g,b}=hexToRgb(hex);
  return(0.299*r+0.587*g+0.114*b)>140;
}

async function openPicture(pic,progress){
  const cu=await refreshCurrentUser();
  const purchased=progress&&progress.purchased;
  if(pic.price>0&&!purchased){
    showModal(`
      <div class="modal-title">🔒 Платная картина</div>
      <p style="color:var(--text2);font-size:14px;margin-bottom:8px">Потратить <b>${pic.price}</b> <span class="coin-icon" style="vertical-align:-2px"></span> монет на «${escapeHtml(pic.name)}»?</p>
      <p style="font-size:13px;color:var(--text2);margin-bottom:20px">У вас: ${cu.coins} монет</p>
      <div style="display:flex;gap:8px">
        <button class="btn-orange" style="flex:1" onclick="purchaseAndOpen(${pic.id})">Да</button>
        <button class="btn-ghost" style="flex:1" onclick="closeModal()">Нет</button>
      </div>`);
    return;
  }
  await startDraw(pic);
}

async function purchaseAndOpen(picId){
  const cu=await refreshCurrentUser();
  const pics=await DB.getPictures();
  const pic=pics.find(p=>p.id===picId);
  if(!pic)return;
  if(cu.coins<pic.price){showToast('Недостаточно монет');closeModal();return}
  const newCoins=cu.coins-pic.price;
  await DB.updateUser(cu.login,{coins:newCoins});
  cu.coins=newCoins;window._cu=cu;updateCoinsDisplay();

  let progress=await DB.getProgress(cu.login,picId);
  if(!progress){
    progress=await DB.createProgress({userLogin:cu.login,pictureId:picId,pixels:{},full:false,purchased:true});
  }else{
    await DB.updateProgress(cu.login,picId,{purchased:true});
    progress.purchased=true;
  }
  closeModal();
  await startDraw(pic);
}

// ============================================================
// DRAWING
// ============================================================
let _drawState={};

async function startDraw(pic){
  const cu=await refreshCurrentUser();
  const ds=_drawState;
  ds.pic=pic;
  ds.selectedColorIdx=null;
  ds.colorPage=0;
  ds.isDrawing=false;
  ds.panMode=false;
  ds._isPanning=false;
  ds.zoom=1;

  document.getElementById('draw-canvas-wrap').classList.remove('zoomed');
  document.getElementById('draw-pan-toggle').classList.add('hidden');

  let progress=await DB.getProgress(cu.login,pic.id);
  if(!progress){
    progress=await DB.createProgress({userLogin:cu.login,pictureId:pic.id,pixels:{},full:false,purchased:pic.price===0});
  }
  ds.progress=progress;

  document.getElementById('draw-title').textContent=pic.name;
  document.getElementById('draw-coins-badge').innerHTML=`<span class="coin-icon"></span>+${pic.reward}`;

  buildRemainingColors();
  if(ds.remainingColors.length>0)ds.selectedColorIdx=0;

  renderDrawCanvas(true);
  renderColorMenu();

  document.getElementById('draw-screen').classList.add('open');
}

function buildRemainingColors(){
  const ds=_drawState;
  const pic=ds.pic;
  const progress=ds.progress;
  const colorCount={};
  const colorDone={};
  pic.pixels.forEach(row=>row.forEach(px=>{
    if(px.colorIdx<0)return;
    colorCount[px.colorIdx]=(colorCount[px.colorIdx]||0)+1;
  }));
  Object.keys(colorCount).forEach(ci=>{colorDone[ci]=0});
  Object.entries(progress.pixels).forEach(([key,ci])=>{
    if(colorDone[ci]!==undefined)colorDone[ci]++;
  });
  ds.remainingColors=Object.keys(colorCount).filter(ci=>colorDone[ci]<colorCount[ci]).map(Number).sort((a,b)=>a-b);
  ds.colorCount=colorCount;
  ds.colorDone=colorDone;
}

function getLabel(idx,pic){
  if(pic&&pic.labels&&pic.labels[idx]!==undefined&&pic.labels[idx]!=='')return pic.labels[idx];
  const labels='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  return labels[idx%labels.length];
}

function renderDrawCanvas(fitToScreen){
  const ds=_drawState;
  const pic=ds.pic;
  const wrap=document.getElementById('draw-canvas-wrap');
  const wrapW=wrap.clientWidth-20,wrapH=wrap.clientHeight-20;

  if(fitToScreen){
    const baseSize=Math.min(Math.floor(wrapW/pic.cols),Math.floor(wrapH/pic.rows));
    ds.baseCellSize=Math.max(baseSize,4);
    ds.zoom=1;
  }
  const cellSize=ds.baseCellSize*ds.zoom;

  const cvs=document.getElementById('draw-canvas');
  cvs.width=pic.cols*cellSize;
  cvs.height=pic.rows*cellSize;
  cvs.style.width=cvs.width+'px';
  cvs.style.height=cvs.height+'px';
  const ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,cvs.width,cvs.height);

  const emptyColor=getComputedStyle(document.documentElement).getPropertyValue('--bg3')||'#E4E4E7';
  const showLabels=cellSize>=14;
  pic.pixels.forEach((row,r)=>row.forEach((px,c)=>{
    const x=c*cellSize,y=r*cellSize;
    const key=`${r},${c}`;
    if(px.colorIdx<0){
      ctx.fillStyle=emptyColor;
      ctx.fillRect(x,y,cellSize,cellSize);
      return;
    }
    const done=ds.progress.pixels[key]!==undefined;
    if(done){
      ctx.fillStyle=pic.palette[px.colorIdx];
      ctx.fillRect(x,y,cellSize,cellSize);
    }else{
      ctx.fillStyle='#E8E8E8';
      ctx.fillRect(x,y,cellSize,cellSize);
      ctx.strokeStyle='#CCC';ctx.lineWidth=0.5;
      ctx.strokeRect(x+.25,y+.25,cellSize-.5,cellSize-.5);
      if(showLabels){
        ctx.fillStyle='#888';
        ctx.font=`${Math.min(cellSize*.5,13)}px monospace`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(getLabel(px.colorIdx,pic),x+cellSize/2,y+cellSize/2);
      }
    }
  }));
  ds.cellSize=cellSize;
  setupDrawEvents(cvs);
}

function setupDrawEvents(cvs){
  const wrap=document.getElementById('draw-canvas-wrap');

  cvs.onmousedown=e=>{
    e.preventDefault();
    if(_drawState.panMode){
      _drawState._panStartX=e.clientX;_drawState._panStartY=e.clientY;
      _drawState._panScrollX=wrap.scrollLeft;_drawState._panScrollY=wrap.scrollTop;
      _drawState._isPanning=true;
      return;
    }
    _drawState.isDrawing=true;paintAt(e.clientX,e.clientY);
  };
  window.removeEventListener('mousemove',globalMouseMove);
  window.removeEventListener('mouseup',globalMouseUp);
  window.addEventListener('mousemove',globalMouseMove);
  window.addEventListener('mouseup',globalMouseUp);

  cvs.ontouchstart=e=>{
    if(e.touches.length===1){
      if(_drawState.panMode){
        _drawState._panStartX=e.touches[0].clientX;_drawState._panStartY=e.touches[0].clientY;
        _drawState._panScrollX=wrap.scrollLeft;_drawState._panScrollY=wrap.scrollTop;
        _drawState._isPanning=true;
        return;
      }
      e.preventDefault();_drawState.isDrawing=true;paintAt(e.touches[0].clientX,e.touches[0].clientY);
    }else if(e.touches.length===2){
      _drawState.isDrawing=false;_drawState._isPanning=false;
      _drawState._pinchDist=getPinchDist(e.touches);
      _drawState._pinchZoomStart=_drawState.zoom;
      _drawState._pinchMidX=(e.touches[0].clientX+e.touches[1].clientX)/2;
      _drawState._pinchMidY=(e.touches[0].clientY+e.touches[1].clientY)/2;
    }
  };
  cvs.ontouchmove=e=>{
    if(e.touches.length===1&&_drawState._isPanning){
      e.preventDefault();
      wrap.scrollLeft=_drawState._panScrollX-(e.touches[0].clientX-_drawState._panStartX);
      wrap.scrollTop=_drawState._panScrollY-(e.touches[0].clientY-_drawState._panStartY);
      return;
    }
    if(e.touches.length===1&&_drawState.isDrawing){
      e.preventDefault();
      paintAt(e.touches[0].clientX,e.touches[0].clientY);
    }else if(e.touches.length===2){
      e.preventDefault();
      const dist=getPinchDist(e.touches);
      const ratio=dist/_drawState._pinchDist;
      setZoom(_drawState._pinchZoomStart*ratio);
    }
  };
  cvs.ontouchend=()=>{_drawState.isDrawing=false;_drawState._isPanning=false;checkCompletion();};

  wrap.onwheel=e=>{
    e.preventDefault();
    const delta=e.deltaY<0?1.1:0.9;
    setZoom(_drawState.zoom*delta);
  };
}

function globalMouseMove(e){
  if(_drawState._isPanning){
    const wrap=document.getElementById('draw-canvas-wrap');
    wrap.scrollLeft=_drawState._panScrollX-(e.clientX-_drawState._panStartX);
    wrap.scrollTop=_drawState._panScrollY-(e.clientY-_drawState._panStartY);
    return;
  }
  if(_drawState.isDrawing&&document.getElementById('draw-screen').classList.contains('open')){
    paintAt(e.clientX,e.clientY);
  }
}
function globalMouseUp(){
  _drawState._isPanning=false;
  if(_drawState.isDrawing){
    _drawState.isDrawing=false;
    checkCompletion();
  }
}

function getPinchDist(touches){
  const dx=touches[0].clientX-touches[1].clientX;
  const dy=touches[0].clientY-touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

function togglePanMode(){
  const ds=_drawState;
  ds.panMode=!ds.panMode;
  const btn=document.getElementById('draw-pan-toggle');
  const cvs=document.getElementById('draw-canvas');
  if(ds.panMode){
    btn.className='btn-orange';
    btn.style.padding='7px 10px';btn.style.fontSize='12px';
    cvs.style.cursor='grab';
  }else{
    btn.className='btn-ghost';
    btn.style.padding='7px 10px';btn.style.fontSize='12px';
    cvs.style.cursor='crosshair';
  }
}

function updatePanToggleVisibility(){
  const ds=_drawState;
  const btn=document.getElementById('draw-pan-toggle');
  if(ds.zoom>1.05){
    btn.classList.remove('hidden');
  }else{
    btn.classList.add('hidden');
    ds.panMode=false;
    const cvs=document.getElementById('draw-canvas');
    if(cvs){cvs.style.cursor='crosshair';btn.className='btn-ghost';btn.style.padding='7px 10px';btn.style.fontSize='12px';}
  }
}

function setZoom(z){
  const ds=_drawState;
  const wrap=document.getElementById('draw-canvas-wrap');
  // запоминаем относительную позицию центра видимой области, чтобы зум был "от центра"
  const oldZoom=ds.zoom;
  const centerX=wrap.scrollLeft+wrap.clientWidth/2;
  const centerY=wrap.scrollTop+wrap.clientHeight/2;
  ds.zoom=Math.max(0.4,Math.min(8,z));
  renderDrawCanvas(false);
  const ratio=ds.zoom/oldZoom;
  wrap.scrollLeft=centerX*ratio-wrap.clientWidth/2;
  wrap.scrollTop=centerY*ratio-wrap.clientHeight/2;
  wrap.classList.toggle('zoomed',ds.zoom>1.05);
  updatePanToggleVisibility();
  const hint=document.getElementById('zoom-hint');
  hint.textContent=Math.round(ds.zoom*100)+'%';
  hint.style.opacity='1';
  clearTimeout(ds._zoomHintTimer);
  ds._zoomHintTimer=setTimeout(()=>{hint.style.opacity='0';},900);
}

function paintAt(clientX,clientY){
  const ds=_drawState;
  if(ds.panMode)return;
  if(ds.selectedColorIdx===null||ds.selectedColorIdx===undefined)return;
  const cvs=document.getElementById('draw-canvas');
  const rect=cvs.getBoundingClientRect();
  const scaleX=cvs.width/rect.width;
  const scaleY=cvs.height/rect.height;
  const mx=(clientX-rect.left)*scaleX;
  const my=(clientY-rect.top)*scaleY;
  const c=Math.floor(mx/ds.cellSize);
  const r=Math.floor(my/ds.cellSize);
  // Если вышли за границу рисунка — просто не красим, но isDrawing остаётся true,
  // поэтому при возврате курсора/пальца обратно рисование продолжится без повторного зажатия
  if(r<0||r>=ds.pic.rows||c<0||c>=ds.pic.cols)return;
  const px=ds.pic.pixels[r][c];
  if(px.colorIdx<0)return;
  if(px.colorIdx!==ds.remainingColors[ds.selectedColorIdx])return;
  const key=`${r},${c}`;
  if(ds.progress.pixels[key]!==undefined)return;
  ds.progress.pixels[key]=px.colorIdx;

  const ci=px.colorIdx;
  ds.colorDone[ci]=(ds.colorDone[ci]||0)+1;

  const ctx=document.getElementById('draw-canvas').getContext('2d');
  const x=c*ds.cellSize,y=r*ds.cellSize;
  ctx.fillStyle=ds.pic.palette[ci];
  ctx.fillRect(x,y,ds.cellSize,ds.cellSize);

  schedulePixelSave();

  if(ds.colorDone[ci]>=ds.colorCount[ci]){
    const ri=ds.remainingColors.indexOf(ci);
    if(ri>=0){
      ds.remainingColors.splice(ri,1);
      if(ds.selectedColorIdx>=ds.remainingColors.length)ds.selectedColorIdx=Math.max(0,ds.remainingColors.length-1);
      ds.colorPage=0;
      renderColorMenu();
    }
  }
  updateColorProgress(ci);
}

let _saveTimer=null;
function schedulePixelSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    const ds=_drawState;
    if(!ds.pic)return;
    await DB.updateProgress(window._cu.login,ds.pic.id,{pixels:ds.progress.pixels});
  },600);
}
async function forceSavePixels(){
  clearTimeout(_saveTimer);
  const ds=_drawState;
  if(!ds.pic||!window._cu)return;
  await DB.updateProgress(window._cu.login,ds.pic.id,{pixels:ds.progress.pixels});
}

function updateColorProgress(ci){
  const ds=_drawState;
  const pct=(ds.colorDone[ci]||0)/(ds.colorCount[ci]||1)*100;
  const bar=document.getElementById('cprog-'+ci);
  if(bar)bar.style.width=pct+'%';
}

async function checkCompletion(){
  const ds=_drawState;
  if(!ds.pic)return;
  if(ds.remainingColors.length>0)return;
  await forceSavePixels();
  const cu=await refreshCurrentUser();
  const already=await DB.getProgress(cu.login,ds.pic.id);
  if(already&&already.full)return;

  await DB.updateProgress(cu.login,ds.pic.id,{full:true,doneAt:Date.now()});
  const newCoins=cu.coins+ds.pic.reward;
  const newTotal=cu.totalCoins+ds.pic.reward;
  await DB.updateUser(cu.login,{coins:newCoins,totalCoins:newTotal});
  cu.coins=newCoins;cu.totalCoins=newTotal;window._cu=cu;updateCoinsDisplay();

  setTimeout(()=>{
    showModal(`<div class="modal-title">🎉 Картина завершена!</div>
      <p style="color:var(--text2);font-size:14px;margin-bottom:16px">Вы закрасили «${escapeHtml(ds.pic.name)}» и получили <b>${ds.pic.reward}</b> <span class="coin-icon" style="vertical-align:-2px"></span> монет!</p>
      <button class="btn-orange w100" onclick="closeModal();exitDraw()">Отлично!</button>`);
  },250);
}

function renderColorMenu(){
  const ds=_drawState;
  const PER_PAGE=8;
  const start=ds.colorPage*PER_PAGE;
  const slice=ds.remainingColors.slice(start,start+PER_PAGE);
  const total=Math.ceil(ds.remainingColors.length/PER_PAGE);

  document.getElementById('color-page-info').textContent=total>1?`${ds.colorPage+1}/${total}`:'';
  document.getElementById('color-prev').style.opacity=ds.colorPage===0?.3:1;
  document.getElementById('color-next').style.opacity=ds.colorPage>=total-1?.3:1;

  const row=document.getElementById('color-row');
  row.innerHTML='';
  slice.forEach(ci=>{
    const globalIdx=ds.remainingColors.indexOf(ci);
    const col=ds.pic.palette[ci];
    const pct=(ds.colorDone[ci]||0)/(ds.colorCount[ci]||1)*100;
    const bright=isLight(col);
    const item=document.createElement('div');
    item.className='color-item'+(globalIdx===ds.selectedColorIdx?' selected':'');
    item.style.background=col;
    item.innerHTML=`
      <div class="color-label" style="color:${bright?'#000':'#fff'}">${getLabel(ci,ds.pic)}</div>
      <div class="color-progress" id="cprog-${ci}" style="width:${pct}%"></div>`;
    item.onclick=()=>{ds.selectedColorIdx=globalIdx;renderColorMenu()};
    row.appendChild(item);
  });
  if(ds.remainingColors.length===0){
    row.innerHTML='<div style="color:var(--text2);font-size:14px;text-align:center;width:100%">Все цвета закрашены!</div>';
  }
}

function colPage(d){
  const ds=_drawState;
  const PER_PAGE=8;
  const total=Math.ceil(ds.remainingColors.length/PER_PAGE);
  ds.colorPage=Math.max(0,Math.min(total-1,ds.colorPage+d));
  renderColorMenu();
}

async function exitDraw(){
  await forceSavePixels();
  window.removeEventListener('mousemove',globalMouseMove);
  window.removeEventListener('mouseup',globalMouseUp);
  document.getElementById('draw-screen').classList.remove('open');
  _drawState={};
  await renderPictures();
}

async function renderFriends(){
  const cu=await refreshCurrentUser();
  const container=document.getElementById('friends-list');
  container.innerHTML='<div style="text-align:center;padding:40px;color:var(--text2)">Загрузка...</div>';

  const [friends,requests]=await Promise.all([DB.getFriends(cu.login),DB.getFriendRequests(cu.login)]);

  if(!friends.length&&!requests.length){
    container.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--text2)">У вас пока нет друзей 😔<br>Найдите их через Поиск</div>';
    return;
  }
  container.innerHTML='';
  if(requests.length){
    const sec=document.createElement('div');
    sec.innerHTML='<div class="section-title" style="margin-top:0">Заявки</div>';
    for(const login of requests){
      const u=await DB.getUser(login);
      if(!u)continue;
      const item=makeUserItem(u,`
        <button class="btn-orange" style="padding:5px 10px;font-size:12px" onclick="acceptFriend('${login}')">Принять</button>
        <button class="btn-ghost" style="padding:5px 10px;font-size:12px" onclick="rejectFriend('${login}')">Отклонить</button>`);
      sec.appendChild(item);
    }
    container.appendChild(sec);
  }
  if(friends.length){
    const sec=document.createElement('div');
    sec.innerHTML='<div class="section-title">Друзья</div>';
    for(const login of friends){
      const u=await DB.getUser(login);
      if(!u)continue;
      const item=makeUserItem(u,`<button class="btn-ghost" style="padding:5px 10px;font-size:12px" onclick="viewProfile('${login}')">Профиль</button>`);
      sec.appendChild(item);
    }
    container.appendChild(sec);
  }
}

function makeUserItem(u,actionsHtml=''){
  const wrap=document.createElement('div');
  const item=document.createElement('div');
  item.className='user-item';
  item.innerHTML=`
    <div class="u-avatar">${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:(u.nick||u.login)[0].toUpperCase()}</div>
    <div style="min-width:0"><div class="u-name">${escapeHtml(u.nick||u.login)}</div>${u.nick!==u.login?`<div class="u-sub">@${escapeHtml(u.login)}</div>`:''}</div>
    <div class="friend-actions">${actionsHtml}</div>`;
  wrap.appendChild(item);
  return wrap;
}

async function sendFriendRequest(toLogin){
  const cu=await refreshCurrentUser();
  const friends=await DB.getFriends(cu.login);
  if(friends.includes(toLogin)){showToast('Уже в друзьях');return}
  const ok=await DB.sendFriendRequest(cu.login,toLogin);
  if(ok)showToast('Заявка отправлена!');else showToast('Заявка уже отправлена');
  closeModal();
  if(getActiveNav()==='search')doSearch();
}

async function acceptFriend(login){
  const cu=await refreshCurrentUser();
  await DB.addFriendship(cu.login,login);
  await DB.removeFriendRequest(login,cu.login);
  await renderFriends();
}

async function rejectFriend(login){
  const cu=await refreshCurrentUser();
  await DB.removeFriendRequest(login,cu.login);
  await renderFriends();
}

let _searchTimer=null;
function doSearch(){
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(doSearchNow,250);
}
async function doSearchNow(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  const res=document.getElementById('search-results');
  if(!q){res.innerHTML='';return}
  res.innerHTML='<div style="text-align:center;padding:20px;color:var(--text2)">Поиск...</div>';
  const cu=window._cu;
  const [allUsers,friends,myReqsSent]=await Promise.all([DB.getUsers(),DB.getFriends(cu.login),getSentRequestsByMe(cu.login)]);
  const users=allUsers.filter(u=>u.login!==cu.login&&(u.login.toLowerCase().includes(q)||(u.nick||'').toLowerCase().includes(q)));
  res.innerHTML='';
  users.forEach(u=>{
    const isFriend=friends.includes(u.login);
    const sentReq=myReqsSent.includes(u.login);
    const item=makeUserItem(u,`
      <button class="btn-ghost" style="padding:5px 10px;font-size:12px" onclick="viewProfile('${u.login}')">Профиль</button>
      ${!isFriend&&!sentReq?`<button class="btn-orange" style="padding:5px 10px;font-size:12px" onclick="sendFriendRequest('${u.login}')">+ Друг</button>`:''}
      ${isFriend?'<span class="badge badge-green">Друг</span>':''}
      ${sentReq&&!isFriend?'<span class="badge badge-orange">Отправлено</span>':''}
    `);
    res.appendChild(item);
  });
  if(!users.length)res.innerHTML='<div style="text-align:center;color:var(--text2);padding:20px">Не найдено</div>';
}
async function getSentRequestsByMe(login){
  if(DEMO_MODE){
    return(LS.get('requests')||[]).filter(r=>r.fromLogin===login).map(r=>r.toLogin);
  }
  const {data,error}=await sb.from('friend_requests').select('to_login').eq('from_login',login);
  if(error)return[];
  return data.map(d=>d.to_login);
}

let _topMode='coins';
function switchTop(m){
  _topMode=m;
  document.querySelectorAll('.top-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='coins')||(i===1&&m==='pics')));
  renderTop();
}

async function renderTop(){
  const list=document.getElementById('top-list');
  list.innerHTML='<div style="text-align:center;padding:40px;color:var(--text2)">Загрузка...</div>';
  const users=await DB.getUsers();
  let sorted;
  if(_topMode==='coins'){
    sorted=[...users].sort((a,b)=>(b.totalCoins||0)-(a.totalCoins||0));
  }else{
    const withPicsCount=await Promise.all(users.map(async u=>{
      const prog=await DB.getAllProgressForUser(u.login);
      return{...u,picsCount:prog.filter(p=>p.full).length};

  list.innerHTML='';

async function viewProfile(login){
  const cu=window._cu;

  const isAdminViewing=cu.isAdmin&&!isSelf;

  const container=document.getElementById('profile-content');
  container.innerHTML='<div style="text-align:center;padding:40px;color:var(--text2)">Загрузка...</div>';

  const [allProgress,friends,pics]=await Promise.all([
    DB.getAllProgressForUser(u.login),
    DB.getFriends(u.login),
    DB.getPictures()
  ]);
  const completed=allProgress.filter(c=>c.full).sort((a,b)=>(b.doneAt||0)-(a.doneAt||0));

  const avatarHtml=u.avatar
    ?`<img src="${u.avatar}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--orange)">`
    :`<div style="width:80px;height:80px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;border:3px solid var(--orange-dark)">${(u.nick||u.login)[0].toUpperCase()}</div>`;

  container.innerHTML=`
    <div class="profile-header">
      <div>${isSelf?`<label style="cursor:pointer" title="Сменить аватар">${avatarHtml}<input type="file" accept="image/*" style="display:none" onchange="changeAvatar(this)"></label>`:avatarHtml}</div>
      <div class="profile-info">
        <div class="profile-nick">${escapeHtml(u.nick||u.login)}</div>
        ${u.nick&&u.nick!==u.login?`<div class="profile-login">@${escapeHtml(u.login)}</div>`:''}
        <div class="profile-desc">${escapeHtml(u.desc||'')}</div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          ${isSelf?`<button class="edit-btn" onclick="editProfile()">✏️ Редактировать</button><button class="edit-btn" style="color:#F87171" onclick="doLogout()">Выйти</button>`:''}
          ${isAdminViewing?`<button class="edit-btn" style="color:#F87171" onclick="adminDeleteUser('${u.login}')">🗑 Удалить аккаунт</button>`:''}
        </div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num"><span class="coin-icon"></span>${u.totalCoins||0}</div><div class="stat-label">Монет</div></div>
      <div class="stat-box"><div class="stat-num">${completed.length}</div><div class="stat-label">Картин</div></div>
      <div class="stat-box"><div class="stat-num">${friends.length}</div><div class="stat-label">Друзей</div></div>
    </div>
    ${!isSelf&&!isAdminViewing?`<button class="btn-orange w100" style="margin-bottom:16px" onclick="sendFriendRequest('${login}')">+ В друзья</button>`:''}
    <div class="section-title">Закрашенные картины</div>
    <div class="completed-grid" id="completed-grid-${login}"></div>`;

  const grid=document.getElementById(`completed-grid-${login}`);
  if(!completed.length){
    grid.innerHTML='<div style="color:var(--text2);font-size:13px">Пока нет завершённых картин</div>';
  }else{
    completed.forEach(cp=>{
      const pic=pics.find(p=>p.id===cp.pictureId);
      if(!pic)return;
      const card=document.createElement('div');
      card.className='completed-card';
      card.innerHTML=`<canvas id="cth-${cp.pictureId}-${login}" width="${pic.cols}" height="${pic.rows}"></canvas>`;
      card.onclick=()=>viewCompleted(pic);
      grid.appendChild(card);
      setTimeout(()=>drawFullColorThumb(pic,`cth-${cp.pictureId}-${login}`),0);
    });
  }
  if(isSelf&&completed.length){
    const ab=document.createElement('div');
    ab.innerHTML='<div class="section-title">Установить аватар из картины</div><div class="completed-grid" id="avatar-pick-grid"></div>';
    container.appendChild(ab);
    const apg=ab.querySelector('#avatar-pick-grid');
    completed.forEach(cp=>{
      const pic=pics.find(p=>p.id===cp.pictureId);
      if(!pic)return;
      const card=document.createElement('div');
      card.className='completed-card';
      card.style.cursor='pointer';
      card.innerHTML=`<canvas id="apth-${cp.pictureId}" width="${pic.cols}" height="${pic.rows}"></canvas>`;
      card.onclick=()=>setAvatarFromPic(pic);
      apg.appendChild(card);
      setTimeout(()=>drawFullColorThumb(pic,`apth-${cp.pictureId}`),0);
    });
  }
}

function drawFullColorThumb(pic,id){
  const cvs=document.getElementById(id);
  if(!cvs)return;
  cvs.width=pic.cols;cvs.height=pic.rows;
  const ctx=cvs.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const img=ctx.createImageData(pic.cols,pic.rows);
  pic.pixels.forEach((row,r)=>row.forEach((px,c)=>{
    const i=(r*pic.cols+c)*4;
    if(px.colorIdx<0){img.data[i]=235;img.data[i+1]=235;img.data[i+2]=235;img.data[i+3]=255;return;}
    const rgb=hexToRgb(pic.palette[px.colorIdx]);
    img.data[i]=rgb.r;img.data[i+1]=rgb.g;img.data[i+2]=rgb.b;img.data[i+3]=255;
  }));
  ctx.putImageData(img,0,0);
}

let _vcState={zoom:1,baseSize:4,pic:null};

function viewCompleted(pic){
  document.getElementById('view-completed-title').textContent=pic.name;
  _vcState={zoom:1,pic:pic};
  renderViewCompletedCanvas(true);
  document.getElementById('view-completed-screen').classList.add('open');
  setupViewCompletedEvents();
}

function renderViewCompletedCanvas(fitToScreen){
  const vc=_vcState;
  const pic=vc.pic;
  const cvs=document.getElementById('view-completed-canvas');
  const wrap=document.getElementById('view-completed-wrap');
  const wrapW=wrap.clientWidth-20,wrapH=wrap.clientHeight-20;

  if(fitToScreen){
    vc.baseSize=Math.max(Math.min(Math.floor(wrapW/pic.cols),Math.floor(wrapH/pic.rows)),4);
    vc.zoom=1;
  }
  const SIZE=vc.baseSize*vc.zoom;
  cvs.width=pic.cols*SIZE;cvs.height=pic.rows*SIZE;
  cvs.style.width=cvs.width+'px';cvs.style.height=cvs.height+'px';
  const ctx=cvs.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const off=document.createElement('canvas');
  off.width=pic.cols;off.height=pic.rows;
  const offCtx=off.getContext('2d');
  const img=offCtx.createImageData(pic.cols,pic.rows);
  pic.pixels.forEach((row,r)=>row.forEach((px,c)=>{
    const i=(r*pic.cols+c)*4;
    if(px.colorIdx<0){img.data[i]=240;img.data[i+1]=240;img.data[i+2]=240;img.data[i+3]=255;return;}
    const rgb=hexToRgb(pic.palette[px.colorIdx]);
    img.data[i]=rgb.r;img.data[i+1]=rgb.g;img.data[i+2]=rgb.b;img.data[i+3]=255;
  }));
  offCtx.putImageData(img,0,0);
  ctx.drawImage(off,0,0,cvs.width,cvs.height);
  wrap.classList.toggle('zoomed',vc.zoom>1.05);
}

function setupViewCompletedEvents(){
  const wrap=document.getElementById('view-completed-wrap');
  const cvs=document.getElementById('view-completed-canvas');

  wrap.onwheel=e=>{
    e.preventDefault();
    const delta=e.deltaY<0?1.1:0.9;
    setVcZoom(_vcState.zoom*delta);
  };

  let isDown=false,startX,startY,scrollX,scrollY;
  cvs.onmousedown=e=>{
    isDown=true;startX=e.clientX;startY=e.clientY;
    scrollX=wrap.scrollLeft;scrollY=wrap.scrollTop;
    cvs.style.cursor='grabbing';
  };
  window.addEventListener('mousemove',vcMouseMove);
  window.addEventListener('mouseup',vcMouseUp);
  function vcMouseMove(e){
    if(!isDown)return;
    wrap.scrollLeft=scrollX-(e.clientX-startX);
    wrap.scrollTop=scrollY-(e.clientY-startY);
  }
  function vcMouseUp(){isDown=false;cvs.style.cursor='grab';}
  cvs.style.cursor='grab';

  let touchStartX,touchStartY,touchScrollX,touchScrollY,pinchDist,pinchZoomStart;
  cvs.ontouchstart=e=>{
    if(e.touches.length===1){
      touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;
      touchScrollX=wrap.scrollLeft;touchScrollY=wrap.scrollTop;
    }else if(e.touches.length===2){
      pinchDist=getPinchDist(e.touches);
      pinchZoomStart=_vcState.zoom;
    }
  };
  cvs.ontouchmove=e=>{
    e.preventDefault();
    if(e.touches.length===1){
      wrap.scrollLeft=touchScrollX-(e.touches[0].clientX-touchStartX);
      wrap.scrollTop=touchScrollY-(e.touches[0].clientY-touchStartY);
    }else if(e.touches.length===2){
      const dist=getPinchDist(e.touches);
      setVcZoom(pinchZoomStart*(dist/pinchDist));
    }
  };
}

function setVcZoom(z){
  const vc=_vcState;
  const wrap=document.getElementById('view-completed-wrap');
  const oldZoom=vc.zoom;
  const centerX=wrap.scrollLeft+wrap.clientWidth/2;
  const centerY=wrap.scrollTop+wrap.clientHeight/2;
  vc.zoom=Math.max(0.4,Math.min(8,z));
  renderViewCompletedCanvas(false);
  const ratio=vc.zoom/oldZoom;
  wrap.scrollLeft=centerX*ratio-wrap.clientWidth/2;
  wrap.scrollTop=centerY*ratio-wrap.clientHeight/2;
  const hint=document.getElementById('view-completed-zoom-hint');
  hint.textContent=Math.round(vc.zoom*100)+'%';
  hint.style.opacity='1';
  clearTimeout(vc._hintTimer);
  vc._hintTimer=setTimeout(()=>{hint.style.opacity='0';},900);
}

async function saveProfile(){

function changeAvatar(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const img=new Image();
    img.onload=async()=>{
      const off=document.createElement('canvas');
      off.width=160;off.height=160;
      const ctx=off.getContext('2d');
      const side=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-side)/2,(img.height-side)/2,side,side,0,0,160,160);
      const dataUrl=off.toDataURL('image/jpeg',0.85);
      const cu=await refreshCurrentUser();
      await DB.updateUser(cu.login,{avatar:dataUrl});
      cu.avatar=dataUrl;window._cu=cu;
      await viewProfile(cu.login);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function setAvatarFromPic(pic){
  // Рисуем картину пиксель-в-пиксель без сглаживания, затем увеличиваем "жёстким"
  // масштабированием (imageSmoothingEnabled=false), чтобы маленькие картинки
  // не блюрились и аккуратно влезали в круглый аватар.
  const off=document.createElement('canvas');
  off.width=pic.cols;off.height=pic.rows;
  const ctx=off.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const img=ctx.createImageData(pic.cols,pic.rows);
  pic.pixels.forEach((row,r)=>row.forEach((px,c)=>{
    const i=(r*pic.cols+c)*4;
    if(px.colorIdx<0){img.data[i]=235;img.data[i+1]=235;img.data[i+2]=235;img.data[i+3]=255;return;}
    const rgb=hexToRgb(pic.palette[px.colorIdx]);
    img.data[i]=rgb.r;img.data[i+1]=rgb.g;img.data[i+2]=rgb.b;img.data[i+3]=255;
  }));
  ctx.putImageData(img,0,0);
  const targetSize=160;
  const scale=Math.max(1,Math.ceil(targetSize/Math.max(pic.cols,pic.rows)));
  const big=document.createElement('canvas');
  big.width=pic.cols*scale;big.height=pic.rows*scale;
  const bigCtx=big.getContext('2d');
  bigCtx.imageSmoothingEnabled=false;
  bigCtx.drawImage(off,0,0,big.width,big.height);
  const cu=await refreshCurrentUser();
  const dataUrl=big.toDataURL('image/png');
  await DB.updateUser(cu.login,{avatar:dataUrl});
  cu.avatar=dataUrl;window._cu=cu;
  await viewProfile(cu.login);
  showToast('Аватар установлен!');
}
