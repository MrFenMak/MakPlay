<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mak Play</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --panel2:#1e222b;
    --accent:#5b8cff;
    --accent2:#7c5bff;
    --text:#eef0f4;
    --muted:#9aa1ad;
    --danger:#ff5b6e;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:linear-gradient(160deg,#0f1115,#151823 60%,#10121a);color:var(--text);
    font-family:"Segoe UI",Roboto,Arial,sans-serif;min-height:100vh;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}
  .hidden{display:none !important;}

  /* ---------- AUTH ---------- */
  #auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .auth-box{background:var(--panel);border-radius:var(--radius);padding:36px 32px;width:100%;max-width:360px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .auth-box h1{margin:0 0 4px;font-size:28px;}
  .auth-box .sub{color:var(--muted);margin:0 0 24px;font-size:14px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  .field input{width:100%;padding:11px 12px;border-radius:10px;border:1px solid #2a2f3a;background:#0f1117;
    color:var(--text);font-size:14px;outline:none;}
  .field input:focus{border-color:var(--accent);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;
    padding:11px 16px;font-size:14px;font-weight:600;color:#fff;background:var(--accent);transition:.15s;}
  .btn:hover{filter:brightness(1.1);}
  .btn.full{width:100%;}
  .btn.secondary{background:#2a2f3a;color:var(--text);}
  .btn.danger{background:var(--danger);}
  .btn.ghost{background:transparent;border:1px solid #2a2f3a;color:var(--text);}
  .switch-line{margin-top:16px;text-align:center;font-size:13px;color:var(--muted);}
  .switch-line a{color:var(--accent);cursor:pointer;text-decoration:none;}
  .error-msg{color:var(--danger);font-size:13px;margin-top:8px;min-height:16px;}

  /* ---------- HEADER ---------- */
  #app{display:none;}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;
    background:rgba(15,17,21,.7);backdrop-filter:blur(10px);position:sticky;top:0;z-index:20;
    border-bottom:1px solid #1f232c;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand img{width:40px;height:40px;border-radius:12px;object-fit:cover;background:#222;}
  .brand .logo-fallback{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-weight:700;}
  .brand h2{margin:0;font-size:20px;letter-spacing:.3px;}
  .brand .logo-edit{font-size:11px;color:var(--muted);background:#1e222b;border:none;border-radius:6px;padding:3px 8px;margin-left:4px;}
  .header-actions{display:flex;align-items:center;gap:10px;}
  .icon-btn{width:40px;height:40px;border-radius:50%;background:var(--panel2);border:none;color:var(--text);
    display:flex;align-items:center;justify-content:center;font-size:18px;}
  .icon-btn:hover{background:#262b36;}
  .username-chip{font-size:13px;color:var(--muted);margin-right:4px;}

  /* ---------- SECTIONS COLUMN ---------- */
  #sections-wrap{max-width:1100px;margin:0 auto;padding:24px 16px 80px;display:flex;flex-direction:column;gap:22px;}
  .section{background:var(--panel);border-radius:var(--radius);padding:14px 16px 18px;position:relative;}
  .section.dragging{opacity:.4;}
  .section-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .section-handle{cursor:grab;color:var(--muted);font-size:18px;user-select:none;padding:2px 6px;}
  .section-title{font-size:18px;font-weight:600;flex:1;}
  .collapse-btn{background:none;border:none;color:var(--muted);font-size:16px;transform:rotate(90deg);transition:.2s;}
  .collapse-btn.collapsed{transform:rotate(0deg);}
  .section-edit-btn{background:#262b36;border:none;color:var(--muted);border-radius:8px;padding:5px 9px;font-size:12px;}
  .section-body{position:relative;}
  .apps-row{display:flex;gap:14px;overflow-x:auto;scroll-behavior:smooth;padding:4px 2px 8px;scrollbar-width:thin;}
  .apps-row::-webkit-scrollbar{height:6px;}
  .apps-row::-webkit-scrollbar-thumb{background:#2a2f3a;border-radius:6px;}
  .section-body.collapsed .apps-row{display:none;}
  .scroll-arrow{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;
    background:rgba(20,22,28,.9);border:1px solid #2a2f3a;color:var(--text);display:flex;align-items:center;
    justify-content:center;font-size:16px;z-index:5;}
  .scroll-arrow.left{left:-6px;}
  .scroll-arrow.right{right:-6px;}

  .app-card{flex:0 0 140px;background:var(--panel2);border-radius:14px;padding:10px;text-align:center;
    position:relative;cursor:pointer;transition:.15s;border:1px solid transparent;}
  .app-card:hover{border-color:#33394a;transform:translateY(-2px);}
  .app-card.dragging{opacity:.35;}
  .app-handle{position:absolute;top:4px;left:4px;color:var(--muted);font-size:14px;cursor:grab;
    background:rgba(0,0,0,.3);border-radius:6px;padding:1px 4px;}
  .app-icon{width:64px;height:64px;border-radius:14px;object-fit:cover;background:#2a2f3a;margin:0 auto 8px;display:block;}
  .app-name{font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .app-card-actions{display:flex;gap:6px;justify-content:center;margin-top:6px;}
  .dl-btn{font-size:12px;padding:6px 10px;border-radius:8px;background:var(--accent);color:#fff;border:none;width:100%;font-weight:600;}
  .admin-mini-btn{font-size:11px;padding:5px 8px;border-radius:7px;background:#30364380;border:none;color:var(--muted);}

  .add-fab{position:fixed;bottom:26px;right:26px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;color:#fff;font-size:30px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(91,140,255,.45);z-index:30;}

  /* ---------- MODALS ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(5,6,9,.65);display:flex;align-items:center;justify-content:center;
    z-index:100;padding:16px;}
  .modal{background:var(--panel);border-radius:18px;padding:26px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 16px;font-size:19px;}
  .modal-tabs{display:flex;gap:8px;margin-bottom:18px;}
  .modal-tabs button{flex:1;padding:9px;border-radius:9px;border:1px solid #2a2f3a;background:#0f1117;color:var(--muted);font-weight:600;font-size:13px;}
  .modal-tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
  textarea.field-input{width:100%;min-height:70px;padding:10px;border-radius:10px;border:1px solid #2a2f3a;
    background:#0f1117;color:var(--text);resize:vertical;font-size:14px;}
  select.field-input{width:100%;padding:10px;border-radius:10px;border:1px solid #2a2f3a;background:#0f1117;color:var(--text);}
  .filepick{display:flex;align-items:center;gap:10px;background:#0f1117;border:1px solid #2a2f3a;border-radius:10px;padding:9px 10px;}
  .filepick input[type=file]{flex:1;font-size:12px;color:var(--muted);}
  .thumb-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .thumb-row img{width:54px;height:54px;border-radius:8px;object-fit:cover;}
  .close-x{position:absolute;top:14px;right:18px;background:none;border:none;color:var(--muted);font-size:20px;}
  .modal{position:relative;}

  /* accounts list */
  .acc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #232734;}
  .acc-row:last-child{border-bottom:none;}
  .acc-info b{display:block;font-size:14px;}
  .acc-info span{font-size:12px;color:var(--muted);}
  .confirm-box{text-align:center;}
  .confirm-box .modal-actions{justify-content:center;}

  /* detail modal */
  .detail-icon{width:80px;height:80px;border-radius:18px;object-fit:cover;background:#2a2f3a;margin-bottom:10px;}
  .detail-desc{color:var(--muted);font-size:14px;line-height:1.5;margin:10px 0;white-space:pre-wrap;}
  .tags-row{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
  .tag-chip{background:#262b36;color:var(--muted);font-size:11px;padding:4px 9px;border-radius:20px;}
  .extra-imgs{display:flex;gap:8px;overflow-x:auto;margin:10px 0;}
  .extra-imgs img{height:110px;border-radius:10px;object-fit:cover;}

  .empty-hint{color:var(--muted);text-align:center;padding:60px 20px;font-size:15px;}
  .loading-overlay{position:fixed;inset:0;background:#0f1115;display:flex;align-items:center;justify-content:center;z-index:200;color:var(--muted);}
</style>
</head>
<body>

<div id="boot-loading" class="loading-overlay">Загрузка Mak Play…</div>

<!-- ============ AUTH SCREEN ============ -->
<div id="auth-screen" class="hidden">
  <div class="auth-box">
    <h1>Mak Play</h1>
    <p class="sub" id="auth-sub">Войдите в свой аккаунт</p>

    <div id="login-form">
      <div class="field"><label>Логин</label><input id="login-username" autocomplete="username"></div>
      <div class="field"><label>Пароль</label><input id="login-password" type="password" autocomplete="current-password"></div>
      <button class="btn full" id="login-btn">Войти</button>
      <div class="error-msg" id="login-error"></div>
      <div class="switch-line">Нет аккаунта? <a id="go-register">Зарегистрироваться</a></div>
    </div>

    <div id="register-form" class="hidden">
      <div class="field"><label>Логин</label><input id="reg-username" autocomplete="username"></div>
      <div class="field"><label>Пароль</label><input id="reg-password" type="password" autocomplete="new-password"></div>
      <button class="btn full" id="register-btn">Зарегистрироваться</button>
      <div class="error-msg" id="register-error"></div>
      <div class="switch-line">Уже есть аккаунт? <a id="go-login">Войти</a></div>
    </div>
  </div>
</div>

<!-- ============ MAIN APP ============ -->
<div id="app">
  <header>
    <div class="brand">
      <label id="logo-wrap" style="cursor:default;">
        <img id="logo-img" class="hidden">
        <div id="logo-fallback" class="logo-fallback">M</div>
      </label>
      <h2>Mak Play</h2>
      <button id="logo-edit-btn" class="logo-edit hidden">сменить</button>
      <input type="file" id="logo-file-input" accept="image/*" class="hidden">
    </div>
    <div class="header-actions">
      <span class="username-chip" id="username-chip"></span>
      <button class="icon-btn hidden" id="accounts-btn" title="Аккаунты">👤</button>
      <button class="icon-btn" id="logout-btn" title="Выйти">⎋</button>
    </div>
  </header>

  <div id="sections-wrap"></div>

  <button class="add-fab hidden" id="add-fab">+</button>
</div>

<!-- ============ MODAL: Add App / Section ============ -->
<div class="modal-overlay hidden" id="add-modal-overlay">
  <div class="modal">
    <button class="close-x" data-close>×</button>
    <div class="modal-tabs">
      <button id="tab-app" class="active">Приложение</button>
      <button id="tab-section">Раздел</button>
    </div>

    <div id="form-app">
      <h3 id="app-form-title">Новое приложение</h3>
      <div class="field"><label>Название</label><input id="app-name" class="field-input" style="width:100%;padding:10px;border-radius:10px;border:1px solid #2a2f3a;background:#0f1117;color:var(--text);"></div>
      <div class="field"><label>Раздел</label><select id="app-section" class="field-input"></select></div>
      <div class="field"><label>Иконка (картинка)</label>
        <div class="filepick"><input type="file" id="app-icon-file" accept="image/*"></div>
        <div class="thumb-row" id="app-icon-preview"></div>
      </div>
      <div class="field"><label>Описание</label><textarea id="app-desc" class="field-input"></textarea></div>
      <div class="field"><label>Доп. картинки (можно несколько)</label>
        <div class="filepick"><input type="file" id="app-extra-files" accept="image/*" multiple></div>
        <div class="thumb-row" id="app-extra-preview"></div>
      </div>
      <div class="field"><label>Файл приложения (то, что скачивается)</label>
        <div class="filepick"><input type="file" id="app-package-file"></div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;" id="app-file-current"></div>
      </div>
      <div class="field"><label>Теги (через запятую)</label><input id="app-tags" class="field-input" style="width:100%;padding:10px;border-radius:10px;border:1px solid #2a2f3a;background:#0f1117;color:var(--text);"></div>
      <div class="modal-actions">
        <button class="btn ghost" data-close>Отмена</button>
        <button class="btn" id="save-app-btn">Сохранить</button>
      </div>
      <div class="error-msg" id="app-form-error"></div>
    </div>

    <div id="form-section" class="hidden">
      <h3 id="section-form-title">Новый раздел</h3>
      <div class="field"><label>Название раздела</label><input id="section-title" class="field-input" style="width:100%;padding:10px;border-radius:10px;border:1px solid #2a2f3a;background:#0f1117;color:var(--text);"></div>
      <div class="field"><label>Приложения в разделе</label>
        <div id="section-apps-checklist" style="max-height:220px;overflow-y:auto;border:1px solid #2a2f3a;border-radius:10px;padding:8px;"></div>
      </div>
      <div class="modal-actions">
        <button class="btn ghost" data-close>Отмена</button>
        <button class="btn" id="save-section-btn">Сохранить</button>
      </div>
      <div class="error-msg" id="section-form-error"></div>
    </div>
  </div>
</div>

<!-- ============ MODAL: App detail ============ -->
<div class="modal-overlay hidden" id="detail-modal-overlay">
  <div class="modal">
    <button class="close-x" data-close>×</button>
    <img id="detail-icon" class="detail-icon">
    <h3 id="detail-name"></h3>
    <div class="tags-row" id="detail-tags"></div>
    <div class="extra-imgs" id="detail-extra"></div>
    <div class="detail-desc" id="detail-desc"></div>
    <div class="modal-actions" style="justify-content:space-between;">
      <div id="detail-admin-actions"></div>
      <button class="btn" id="detail-download-btn">Скачать</button>
    </div>
  </div>
</div>

<!-- ============ MODAL: Accounts ============ -->
<div class="modal-overlay hidden" id="accounts-modal-overlay">
  <div class="modal">
    <button class="close-x" data-close>×</button>
    <h3>Аккаунты</h3>
    <div id="accounts-list"></div>
  </div>
</div>

<!-- ============ MODAL: Confirm delete ============ -->
<div class="modal-overlay hidden" id="confirm-modal-overlay">
  <div class="modal confirm-box">
    <p id="confirm-text">Вы уверены?</p>
    <div class="modal-actions">
      <button class="btn danger" id="confirm-yes">Да</button>
      <button class="btn ghost" id="confirm-no">Нет</button>
    </div>
  </div>
</div>

<script>
/* ====================================================================
   НАСТРОЙКИ — ВСТАВЬ СВОИ ДАННЫЕ ИЗ SUPABASE СЮДА
   Project Settings -> API -> Project URL и anon public key
==================================================================== */
const SUPABASE_URL = "https://ccfekmcnwfvwdimpisem.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_28o8HVrzdwdJVBzCF17LcQ_i78jG8QJ";
const ADMIN_USERNAME = "M_fen";
const FAKE_EMAIL_DOMAIN = "makplay.local";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let state = {
  user: null,
  username: null,
  isAdmin: false,
  sections: [],
  apps: [],
  logoUrl: "",
  editingAppId: null,
  editingSectionId: null,
};

const $ = (id) => document.getElementById(id);

function show(el){ el.classList.remove('hidden'); }
function hide(el){ el.classList.add('hidden'); }

/* ---------------------------------------------------------------
   AUTH
--------------------------------------------------------------- */
$('go-register').onclick = () => { hide($('login-form')); show($('register-form')); $('auth-sub').textContent='Создайте аккаунт'; };
$('go-login').onclick = () => { hide($('register-form')); show($('login-form')); $('auth-sub').textContent='Войдите в свой аккаунт'; };

function usernameToEmail(u){ return u.trim().toLowerCase() + '@' + FAKE_EMAIL_DOMAIN; }

$('register-btn').onclick = async () => {
  const username = $('reg-username').value.trim();
  const password = $('reg-password').value;
  $('register-error').textContent = '';
  if(!username || !password){ $('register-error').textContent = 'Заполните логин и пароль'; return; }
  if(password.length < 6){ $('register-error').textContent = 'Пароль минимум 6 символов'; return; }
  const { data, error } = await sb.auth.signUp({ email: usernameToEmail(username), password });
  if(error){ $('register-error').textContent = error.message; return; }
  const uid = data.user?.id;
  if(uid){
    const { error: pErr } = await sb.from('profiles').insert({ id: uid, username });
    if(pErr){ $('register-error').textContent = 'Этот логин уже занят'; return; }
  }
  await afterAuth();
};

$('login-btn').onclick = async () => {
  const username = $('login-username').value.trim();
  const password = $('login-password').value;
  $('login-error').textContent = '';
  if(!username || !password){ $('login-error').textContent = 'Заполните логин и пароль'; return; }
  const { error } = await sb.auth.signInWithPassword({ email: usernameToEmail(username), password });
  if(error){ $('login-error').textContent = 'Неверный логин или пароль'; return; }
  await afterAuth();
};

$('logout-btn').onclick = async () => { await sb.auth.signOut(); location.reload(); };

async function afterAuth(){
  const { data:{ user } } = await sb.auth.getUser();
  if(!user){ return; }
  state.user = user;
  let { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if(!profile){
    // на случай если профиль не создался (старый юзер)
    await sb.from('profiles').insert({ id:user.id, username: user.email.split('@')[0] });
    ({ data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single());
  }
  state.username = profile.username;
  state.isAdmin = profile.username === ADMIN_USERNAME;
  sb.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', user.id);

  hide($('auth-screen'));
  $('app').style.display = 'block';
  $('username-chip').textContent = '@' + state.username;
  if(state.isAdmin){
    show($('add-fab'));
    show($('accounts-btn'));
    show($('logo-edit-btn'));
  }
  await loadAll();
  setupRealtime();
}

/* ---------------------------------------------------------------
   DATA LOADING
--------------------------------------------------------------- */
async function loadAll(){
  const [{ data: sections }, { data: apps }, { data: settings }] = await Promise.all([
    sb.from('sections').select('*').order('position'),
    sb.from('apps').select('*').order('position'),
    sb.from('app_settings').select('*').eq('key','logo_url').maybeSingle(),
  ]);
  state.sections = sections || [];
  state.apps = apps || [];
  state.logoUrl = settings?.value || '';
  renderLogo();
  renderSections();
}

function setupRealtime(){
  sb.channel('mak-play-sync')
    .on('postgres_changes', { event:'*', schema:'public', table:'sections' }, loadAll)
    .on('postgres_changes', { event:'*', schema:'public', table:'apps' }, loadAll)
    .on('postgres_changes', { event:'*', schema:'public', table:'app_settings' }, loadAll)
    .subscribe();
}

function renderLogo(){
  if(state.logoUrl){
    $('logo-img').src = state.logoUrl;
    show($('logo-img'));
    hide($('logo-fallback'));
  } else {
    hide($('logo-img'));
    show($('logo-fallback'));
  }
}

/* ---------------------------------------------------------------
   RENDER SECTIONS + APPS
--------------------------------------------------------------- */
function renderSections(){
  const wrap = $('sections-wrap');
  wrap.innerHTML = '';
  if(state.sections.length === 0){
    wrap.innerHTML = '<div class="empty-hint">Пока нет разделов с приложениями</div>';
    return;
  }
  state.sections.forEach(sec => {
    const secApps = state.apps.filter(a => a.section_id === sec.id).sort((a,b)=>a.position-b.position);
    const div = document.createElement('div');
    div.className = 'section';
    div.dataset.id = sec.id;
    if(state.isAdmin) div.draggable = true;

    const head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML = `
      ${state.isAdmin ? '<span class="section-handle">⠿</span>' : ''}
      <span class="section-title">${escapeHtml(sec.title)}</span>
      ${state.isAdmin ? `<button class="section-edit-btn" data-edit-section="${sec.id}">изменить</button>` : ''}
      <button class="collapse-btn">⌄</button>
    `;
    div.appendChild(head);

    const body = document.createElement('div');
    body.className = 'section-body';
    const row = document.createElement('div');
    row.className = 'apps-row';

    if(secApps.length === 0){
      row.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:10px;">Нет приложений</div>';
    } else {
      secApps.forEach(app => row.appendChild(renderAppCard(app)));
    }
    body.appendChild(row);

    const leftArrow = document.createElement('button');
    leftArrow.className = 'scroll-arrow left hidden'; leftArrow.textContent='‹';
    const rightArrow = document.createElement('button');
    rightArrow.className = 'scroll-arrow right hidden'; rightArrow.textContent='›';
    body.appendChild(leftArrow); body.appendChild(rightArrow);

    function updateArrows(){
      const canScroll = row.scrollWidth > row.clientWidth + 4;
      rightArrow.classList.toggle('hidden', !canScroll || row.scrollLeft + row.clientWidth >= row.scrollWidth - 4);
      leftArrow.classList.toggle('hidden', row.scrollLeft <= 4 || !canScroll);
    }
    row.addEventListener('scroll', updateArrows);
    leftArrow.onclick = () => row.scrollBy({left:-260, behavior:'smooth'});
    rightArrow.onclick = () => row.scrollBy({left:260, behavior:'smooth'});
    setTimeout(updateArrows, 50);

    head.querySelector('.collapse-btn').onclick = () => {
      head.querySelector('.collapse-btn').classList.toggle('collapsed');
      body.classList.toggle('collapsed');
    };
    if(state.isAdmin){
      head.querySelector('[data-edit-section]')?.addEventListener('click', () => openSectionModal(sec.id));
    }

    div.appendChild(body);
    wrap.appendChild(div);

    if(state.isAdmin){
      div.addEventListener('dragstart', () => div.classList.add('dragging'));
      div.addEventListener('dragend', () => div.classList.remove('dragging'));
    }
  });

  if(state.isAdmin) enableSectionDrag(wrap);
}

function renderAppCard(app){
  const card = document.createElement('div');
  card.className = 'app-card';
  card.dataset.id = app.id;
  if(state.isAdmin) card.draggable = true;
  card.innerHTML = `
    ${state.isAdmin ? '<span class="app-handle">⠿</span>' : ''}
    <img class="app-icon" src="${app.icon_url || ''}" onerror="this.style.background='#2a2f3a'">
    <div class="app-name">${escapeHtml(app.name)}</div>
    <div class="app-card-actions">
      <button class="dl-btn" data-dl="${app.id}">Скачать</button>
    </div>
    ${state.isAdmin ? `<div class="app-card-actions">
      <button class="admin-mini-btn" data-edit-app="${app.id}">✎</button>
      <button class="admin-mini-btn" data-del-app="${app.id}">🗑</button>
    </div>` : ''}
  `;
  card.addEventListener('click', (e) => {
    if(e.target.closest('button')) return;
    openDetailModal(app.id);
  });
  card.querySelector('[data-dl]').onclick = (e) => { e.stopPropagation(); downloadApp(app); };
  if(state.isAdmin){
    card.querySelector('[data-edit-app]').onclick = (e) => { e.stopPropagation(); openAppModal(app.id); };
    card.querySelector('[data-del-app]').onclick = (e) => { e.stopPropagation(); confirmDeleteApp(app.id); };
    card.addEventListener('dragstart', () => card.classList.add('dragging'));
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
  }
  return card;
}

function escapeHtml(s){ const d=document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

function downloadApp(app){
  if(!app.file_url){ alert('У приложения пока нет файла'); return; }
  const a = document.createElement('a');
  a.href = app.file_url;
  a.download = app.file_name || app.name;
  a.target = '_blank';
  document.body.appendChild(a); a.click(); a.remove();
}

/* ---------------------------------------------------------------
   DRAG & DROP REORDER (admin only)
--------------------------------------------------------------- */
function enableSectionDrag(wrap){
  wrap.addEventListener('dragover', (e) => {
    e.preventDefault();
    const dragging = wrap.querySelector('.section.dragging');
    if(!dragging) return;
    const siblings = [...wrap.querySelectorAll('.section:not(.dragging)')];
    const next = siblings.find(s => e.clientY < s.getBoundingClientRect().top + s.getBoundingClientRect().height/2);
    wrap.insertBefore(dragging, next || null);
  });
  wrap.addEventListener('drop', async () => {
    const ids = [...wrap.querySelectorAll('.section')].map(s => s.dataset.id);
    await Promise.all(ids.map((id, idx) => sb.from('sections').update({ position: idx }).eq('id', id)));
  });
  // app-level reorder within each apps-row
  wrap.querySelectorAll('.apps-row').forEach(row => {
    row.addEventListener('dragover', (e) => {
      e.preventDefault();
      const dragging = row.querySelector('.app-card.dragging');
      if(!dragging) return;
      const siblings = [...row.querySelectorAll('.app-card:not(.dragging)')];
      const next = siblings.find(c => e.clientX < c.getBoundingClientRect().left + c.getBoundingClientRect().width/2);
      row.insertBefore(dragging, next || null);
    });
    row.addEventListener('drop', async () => {
      const ids = [...row.querySelectorAll('.app-card')].map(c => c.dataset.id);
      await Promise.all(ids.map((id, idx) => sb.from('apps').update({ position: idx }).eq('id', id)));
    });
  });
}

/* ---------------------------------------------------------------
   ADD / EDIT APP MODAL
--------------------------------------------------------------- */
let pendingIconFile=null, pendingExtraFiles=[], pendingPackageFile=null;

$('add-fab').onclick = () => openAppModal(null);
$('tab-app').onclick = () => { $('tab-app').classList.add('active'); $('tab-section').classList.remove('active'); show($('form-app')); hide($('form-section')); };
$('tab-section').onclick = () => { $('tab-section').classList.add('active'); $('tab-app').classList.remove('active'); show($('form-section')); hide($('form-app')); openSectionModal(null,true); };

document.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', closeAllModals));
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', (e) => { if(e.target===o) closeAllModals(); }));

function closeAllModals(){
  document.querySelectorAll('.modal-overlay').forEach(hide);
}

function populateSectionSelect(){
  const sel = $('app-section');
  sel.innerHTML = '<option value="">Без раздела</option>' +
    state.sections.map(s => `<option value="${s.id}">${escapeHtml(s.title)}</option>`).join('');
}

function openAppModal(appId){
  state.editingAppId = appId;
  pendingIconFile=null; pendingExtraFiles=[]; pendingPackageFile=null;
  $('tab-app').click();
  populateSectionSelect();
  $('app-form-error').textContent='';
  $('app-icon-preview').innerHTML=''; $('app-extra-preview').innerHTML=''; $('app-file-current').textContent='';
  if(appId){
    const app = state.apps.find(a => a.id === appId);
    $('app-form-title').textContent = 'Изменить приложение';
    $('app-name').value = app.name;
    $('app-section').value = app.section_id || '';
    $('app-desc').value = app.description || '';
    $('app-tags').value = (app.tags||[]).join(', ');
    if(app.icon_url) $('app-icon-preview').innerHTML = `<img src="${app.icon_url}">`;
    if(app.extra_images?.length) $('app-extra-preview').innerHTML = app.extra_images.map(u=>`<img src="${u}">`).join('');
    if(app.file_name) $('app-file-current').textContent = 'Текущий файл: ' + app.file_name;
  } else {
    $('app-form-title').textContent = 'Новое приложение';
    $('app-name').value=''; $('app-section').value=''; $('app-desc').value=''; $('app-tags').value='';
  }
  show($('add-modal-overlay'));
}

$('app-icon-file').onchange = (e) => {
  pendingIconFile = e.target.files[0];
  if(pendingIconFile) $('app-icon-preview').innerHTML = `<img src="${URL.createObjectURL(pendingIconFile)}">`;
};
$('app-extra-files').onchange = (e) => {
  pendingExtraFiles = [...e.target.files];
  $('app-extra-preview').innerHTML = pendingExtraFiles.map(f=>`<img src="${URL.createObjectURL(f)}">`).join('');
};
$('app-package-file').onchange = (e) => {
  pendingPackageFile = e.target.files[0];
  if(pendingPackageFile) $('app-file-current').textContent = 'Новый файл: ' + pendingPackageFile.name;
};

async function uploadToBucket(bucket, file){
  const path = `${Date.now()}_${Math.random().toString(36).slice(2)}_${file.name}`;
  const { error } = await sb.storage.from(bucket).upload(path, file);
  if(error) throw error;
  const { data } = sb.storage.from(bucket).getPublicUrl(path);
  return data.publicUrl;
}

$('save-app-btn').onclick = async () => {
  const name = $('app-name').value.trim();
  $('app-form-error').textContent='';
  if(!name){ $('app-form-error').textContent='Введите название'; return; }
  $('save-app-btn').textContent='Сохранение…'; $('save-app-btn').disabled=true;
  try{
    const payload = {
      name,
      section_id: $('app-section').value || null,
      description: $('app-desc').value.trim(),
      tags: $('app-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    };
    if(pendingIconFile) payload.icon_url = await uploadToBucket('app-assets', pendingIconFile);
    if(pendingExtraFiles.length){
      const urls = await Promise.all(pendingExtraFiles.map(f => uploadToBucket('app-assets', f)));
      const existing = state.editingAppId ? (state.apps.find(a=>a.id===state.editingAppId)?.extra_images||[]) : [];
      payload.extra_images = [...existing, ...urls];
    }
    if(pendingPackageFile){
      payload.file_url = await uploadToBucket('app-files', pendingPackageFile);
      payload.file_name = pendingPackageFile.name;
    }
    if(state.editingAppId){
      const { error } = await sb.from('apps').update(payload).eq('id', state.editingAppId);
      if(error) throw error;
    } else {
      payload.position = state.apps.length;
      const { error } = await sb.from('apps').insert(payload);
      if(error) throw error;
    }
    closeAllModals();
    await loadAll();
  } catch(err){
    $('app-form-error').textContent = err.message || 'Ошибка сохранения';
  } finally {
    $('save-app-btn').textContent='Сохранить'; $('save-app-btn').disabled=false;
  }
};

function confirmDeleteApp(id){
  openConfirm('Удалить это приложение?', async () => {
    await sb.from('apps').delete().eq('id', id);
    await loadAll();
  });
}

/* ---------------------------------------------------------------
   SECTION MODAL
--------------------------------------------------------------- */
function openSectionModal(sectionId, fromTab){
  state.editingSectionId = sectionId;
  $('section-form-error').textContent='';
  const checklist = $('section-apps-checklist');
  checklist.innerHTML = state.apps.map(a => `
    <label style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;">
      <input type="checkbox" value="${a.id}" ${a.section_id===sectionId ? 'checked':''}> ${escapeHtml(a.name)}
    </label>`).join('') || '<div style="color:var(--muted);font-size:13px;">Пока нет приложений</div>';

  if(sectionId){
    const sec = state.sections.find(s=>s.id===sectionId);
    $('section-form-title').textContent = 'Изменить раздел';
    $('section-title').value = sec.title;
  } else {
    $('section-form-title').textContent = 'Новый раздел';
    $('section-title').value = '';
  }
  if(!fromTab){
    $('tab-section').click();
  }
  show($('add-modal-overlay'));
}

$('save-section-btn').onclick = async () => {
  const title = $('section-title').value.trim();
  $('section-form-error').textContent='';
  if(!title){ $('section-form-error').textContent='Введите название раздела'; return; }
  $('save-section-btn').disabled = true;
  try{
    let secId = state.editingSectionId;
    if(secId){
      await sb.from('sections').update({ title }).eq('id', secId);
    } else {
      const { data, error } = await sb.from('sections').insert({ title, position: state.sections.length }).select().single();
      if(error) throw error;
      secId = data.id;
    }
    const checked = [...document.querySelectorAll('#section-apps-checklist input:checked')].map(i=>i.value);
    const unchecked = [...document.querySelectorAll('#section-apps-checklist input:not(:checked)')].map(i=>i.value);
    await Promise.all([
      ...checked.map(id => sb.from('apps').update({ section_id: secId }).eq('id', id)),
      ...unchecked.map(id => sb.from('apps').update({ section_id: null }).eq('id', id).eq('section_id', secId)),
    ]);
    closeAllModals();
    await loadAll();
  } catch(err){
    $('section-form-error').textContent = err.message || 'Ошибка сохранения';
  } finally {
    $('save-section-btn').disabled = false;
  }
};

/* ---------------------------------------------------------------
   DETAIL MODAL
--------------------------------------------------------------- */
function openDetailModal(appId){
  const app = state.apps.find(a=>a.id===appId);
  if(!app) return;
  $('detail-icon').src = app.icon_url || '';
  $('detail-name').textContent = app.name;
  $('detail-tags').innerHTML = (app.tags||[]).map(t=>`<span class="tag-chip">${escapeHtml(t)}</span>`).join('');
  $('detail-extra').innerHTML = (app.extra_images||[]).map(u=>`<img src="${u}">`).join('');
  $('detail-desc').textContent = app.description || '';
  $('detail-download-btn').onclick = () => downloadApp(app);
  $('detail-admin-actions').innerHTML = state.isAdmin ? `
    <button class="btn ghost" id="detail-edit-btn">Изменить</button>
    <button class="btn danger" id="detail-del-btn">Удалить</button>` : '';
  if(state.isAdmin){
    $('detail-edit-btn').onclick = () => { closeAllModals(); openAppModal(app.id); };
    $('detail-del-btn').onclick = () => { closeAllModals(); confirmDeleteApp(app.id); };
  }
  show($('detail-modal-overlay'));
}

/* ---------------------------------------------------------------
   ACCOUNTS MODAL (admin)
--------------------------------------------------------------- */
$('accounts-btn').onclick = async () => {
  const { data: profiles } = await sb.from('profiles').select('*').order('last_seen', { ascending:false });
  $('accounts-list').innerHTML = (profiles||[]).map(p => `
    <div class="acc-row">
      <div class="acc-info">
        <b>@${escapeHtml(p.username)}</b>
        <span>Последний вход: ${p.last_seen ? new Date(p.last_seen).toLocaleString('ru-RU') : '—'}</span>
      </div>
      ${p.username !== ADMIN_USERNAME ? `<button class="btn danger" data-del-acc="${p.id}">Удалить</button>` : ''}
    </div>`).join('');
  $('accounts-list').querySelectorAll('[data-del-acc]').forEach(btn => {
    btn.onclick = () => {
      openConfirm('Удалить этот аккаунт?', async () => {
        await sb.from('profiles').delete().eq('id', btn.dataset.delAcc);
        $('accounts-btn').click();
      });
    };
  });
  show($('accounts-modal-overlay'));
};

/* ---------------------------------------------------------------
   CONFIRM MODAL
--------------------------------------------------------------- */
function openConfirm(text, onYes){
  $('confirm-text').textContent = text;
  show($('confirm-modal-overlay'));
  $('confirm-yes').onclick = async () => { hide($('confirm-modal-overlay')); await onYes(); };
  $('confirm-no').onclick = () => hide($('confirm-modal-overlay'));
}

/* ---------------------------------------------------------------
   LOGO CHANGE (admin)
--------------------------------------------------------------- */
$('logo-edit-btn').onclick = () => $('logo-file-input').click();
$('logo-file-input').onchange = async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  try{
    const url = await uploadToBucket('app-assets', file);
    await sb.from('app_settings').upsert({ key:'logo_url', value:url });
    await loadAll();
  } catch(err){ alert('Ошибка загрузки: ' + err.message); }
};

/* ---------------------------------------------------------------
   INIT
--------------------------------------------------------------- */
(async function init(){
  if(SUPABASE_URL.includes('YOUR_SUPABASE') ){
    $('boot-loading').innerHTML = 'Сначала вставьте SUPABASE_URL и SUPABASE_ANON_KEY в файле mak-play.html (в самом начале блока &lt;script&gt;).';
    return;
  }
  const { data:{ session } } = await sb.auth.getSession();
  hide($('boot-loading'));
  if(session){
    await afterAuth();
  } else {
    show($('auth-screen'));
  }
})();
</script>
